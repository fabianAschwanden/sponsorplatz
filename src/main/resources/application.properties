# =============================================================================
# Sponsorplatz - Default Properties (greift, wenn kein Profil aktiv ist)
# Lokale Entwicklung laeuft mit Profil "dev" (siehe application-dev.properties)
# Produktion laeuft mit Profil "prod" (siehe application-prod.properties)
# =============================================================================

spring.application.name=sponsorplatz
spring.profiles.default=dev

# Profile-Gruppen: cloud-free aktiviert automatisch prod (Tomcat-Tuning, Security etc.)
# Ersetzt das fruehere `spring.profiles.include=prod` in application-cloud-free.properties,
# das ab Spring Boot 2.4 in profile-specific files verboten ist.
spring.profiles.group.cloud-free=prod

server.port=8080
server.compression.enabled=true
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=false

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Aktuator (Health-Endpoints fuer Container-Healthcheck)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Lokalisierung - Locale wird via CookieLocaleResolver + ?lang= gesteuert (LocaleConfig)
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.ch.sponsorplatz=DEBUG

# Multipart-Upload - Servlet-Cap. Pro-Endpoint-Validation in den Services:
#   MedienAssetService prueft 5 MB pro Bild (image/jpeg|png|webp)
#   /admin/backups/restore akzeptiert SQL-Dumps bis 100 MB (Admin-only)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
