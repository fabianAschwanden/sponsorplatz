# =============================================================================
# Sponsorplatz ? Default Properties (greift, wenn kein Profil aktiv ist)
# Lokale Entwicklung läuft mit Profil "dev" (siehe application-dev.properties)
# Produktion läuft mit Profil "prod" (siehe application-prod.properties)
# =============================================================================

spring.application.name=sponsorplatz
spring.profiles.default=dev

# Profile-Gruppen: cloud-free aktiviert automatisch prod (Tomcat-Tuning, Security etc.)
# Ersetzt das frühere `spring.profiles.include=prod` in application-cloud-free.properties,
# das ab Spring Boot 2.4 in profile-specific files verboten ist.
spring.profiles.group.cloud-free=prod

server.port=8080
server.compression.enabled=true
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=false

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Aktuator (Health-Endpoints für Container-Healthcheck)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Lokalisierung
spring.web.locale=de_CH
spring.web.locale-resolver=fixed
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.ch.sponsorplatz=DEBUG

# Multipart-Upload (Medien-Assets)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

