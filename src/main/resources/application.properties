# =============================================================================
# Sponsorplatz - Default Properties (greift, wenn kein Profil aktiv ist)
# Lokale Entwicklung laeuft mit Profil "dev" (siehe application-dev.properties)
# Produktion laeuft mit Profil "prod" (siehe application-prod.properties)
# =============================================================================

spring.application.name=sponsorplatz
spring.profiles.default=dev

# Profile-Gruppen: cloud-free aktiviert automatisch prod (Tomcat-Tuning, Security etc.)
# Ersetzt das fruehere `spring.profiles.include=prod` in application-cloud-free.properties,
# das ab Spring Boot 2.4 in profile-specific files verboten ist.
spring.profiles.group.cloud-free=prod

server.port=8080
server.compression.enabled=true
server.error.whitelabel.enabled=false

# Thymeleaf
spring.thymeleaf.cache=false

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Aktuator (Health-Endpoints fuer Container-Healthcheck + Prometheus)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Lokalisierung - Locale wird via CookieLocaleResolver + ?lang= gesteuert (LocaleConfig)
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Logging
logging.level.root=INFO
logging.level.ch.sponsorplatz=DEBUG

# Sentry Error-Tracking (Phase 10.2)
# Ohne DSN bleibt Sentry komplett inaktiv (No-Op).
# In prod setzen via: SENTRY_DSN=https://...@sentry.io/...
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:dev}
sentry.release=${SENTRY_RELEASE:sponsorplatz@0.1.0-SNAPSHOT}
sentry.traces-sample-rate=0
sentry.send-default-pii=false
sentry.in-app-includes=ch.sponsorplatz

# Support-Empfaenger (Admin-Mail fuer Support-Formular)
sponsorplatz.support.empfaenger=${SPONSORPLATZ_ADMIN_EMAIL:support@sponsorplatz.ch}

# Multipart-Upload - Servlet-Cap. Pro-Endpoint-Validation in den Services:
#   MedienAssetService prueft 5 MB pro Bild (image/jpeg|png|webp)
#   /admin/backups/restore akzeptiert SQL-Dumps bis 100 MB (Admin-only)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
