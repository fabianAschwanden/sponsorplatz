# AGB-Seite (Phase 10.3)
agb.titel=Allgemeine Gesch\u00e4ftsbedingungen (AGB)
agb.geltungsbereich.titel=1. Geltungsbereich
agb.geltungsbereich.text=Diese Allgemeinen Gesch\u00e4ftsbedingungen regeln die Nutzung der Plattform \u00abSponsorplatz\u00bb (nachfolgend \u00abPlattform\u00bb), betrieben von Fabian Aschwanden (nachfolgend \u00abBetreiber\u00bb). Mit der Registrierung akzeptieren Nutzende diese AGB.
agb.leistungen.titel=2. Leistungen der Plattform
agb.leistungen.text=Die Plattform bringt Vereine und Organisationen aus den Bereichen Sport und Gesundheit mit potenziellen Sponsoren zusammen. Sponsorplatz stellt die technische Infrastruktur bereit - der Plattformbetreiber wird nicht Vertragspartei von Sponsoring-Vereinbarungen zwischen Vereinen und Sponsoren.
agb.registrierung.titel=3. Registrierung und Konto
agb.registrierung.punkt1=Zur Nutzung ist ein Benutzerkonto mit g\u00fcltiger E-Mail-Adresse erforderlich.
agb.registrierung.punkt2=Die Angaben bei der Registrierung m\u00fcssen wahrheitsgem\u00e4ss sein.
agb.registrierung.punkt3=Jede nat\u00fcrliche Person darf nur ein Konto f\u00fchren.
agb.registrierung.punkt4=Das Passwort ist vertraulich zu behandeln. Der Betreiber haftet nicht f\u00fcr Sch\u00e4den aus Missbrauch durch Dritte.
agb.vereine.titel=4. Vereine und Organisationen
agb.vereine.punkt1=Vereine m\u00fcssen einen nachweisbaren Bezug zu Sport oder Gesundheit haben (gem\u00e4ss Branche-Auswahl bei Registrierung).
agb.vereine.punkt2=Der Betreiber beh\u00e4lt sich das Recht vor, Vereine zu verifizieren und bei Verst\u00f6ssen zu suspendieren.
agb.vereine.punkt3=Eingestellte Inhalte (Projekte, Texte, Bilder) m\u00fcssen den geltenden Gesetzen entsprechen und d\u00fcrfen keine Rechte Dritter verletzen.
agb.sponsoren.titel=5. Sponsoren
agb.sponsoren.punkt1=Sponsoren registrieren sich als Unternehmen und k\u00f6nnen \u00fcber den Marktplatz Projekte finden und Anfragen stellen.
agb.sponsoren.punkt2=Sponsoring-Vereinbarungen kommen direkt zwischen Sponsor und Verein zustande. Der Betreiber haftet nicht f\u00fcr die Erf\u00fcllung solcher Vereinbarungen.
agb.gebuehren.titel=6. Geb\u00fchren
agb.gebuehren.text=Die Nutzung der Plattform ist w\u00e4hrend der Pilotphase kostenlos. Sollte ein kostenpflichtiges Modell eingef\u00fchrt werden, werden bestehende Nutzer mindestens 30 Tage im Voraus informiert.
agb.haftung.titel=7. Haftung
agb.haftung.punkt1=Der Betreiber haftet nicht f\u00fcr die Richtigkeit der von Nutzenden eingestellten Inhalte.
agb.haftung.punkt2=Die Verf\u00fcgbarkeit der Plattform wird nach bestem Bem\u00fchen gew\u00e4hrleistet, ein ununterbrochener Betrieb kann jedoch nicht garantiert werden.
agb.haftung.punkt3=Schadensersatzanspr\u00fcche sind, soweit gesetzlich zul\u00e4ssig, auf Vorsatz und grobe Fahrl\u00e4ssigkeit beschr\u00e4nkt.
agb.datenschutz.titel=8. Datenschutz
agb.datenschutz.text=F\u00fcr die Verarbeitung personenbezogener Daten gilt unsere
agb.datenschutz.link=- Datenschutzerkl\u00e4rung
agb.inhalte.titel=9. Inhalte und geistiges Eigentum
agb.inhalte.punkt1=Nutzende behalten alle Rechte an ihren eingestellten Inhalten.
agb.inhalte.punkt2=Mit dem Upload r\u00e4umen Nutzende dem Betreiber ein einfaches, nicht \u00fcbertragbares Nutzungsrecht zur Darstellung auf der Plattform ein.
agb.inhalte.punkt3=Der Betreiber darf offensichtlich rechtswidrige Inhalte ohne Vorank\u00fcndigung entfernen.
agb.kuendigung.titel=10. K\u00fcndigung und Kontol\u00f6schung
agb.kuendigung.punkt1=Nutzende k\u00f6nnen ihr Konto jederzeit per E-Mail an den Betreiber l\u00f6schen lassen.
agb.kuendigung.punkt2=Der Betreiber kann bei Verst\u00f6ssen gegen diese AGB Konten sperren oder l\u00f6schen.
agb.kuendigung.punkt3=Laufende Sponsoring-Vereinbarungen bleiben von einer Kontol\u00f6schung unber\u00fchrt.
agb.aenderungen.titel=11. \u00c4nderungen der AGB
agb.aenderungen.text=Der Betreiber kann diese AGB jederzeit anpassen. Wesentliche \u00c4nderungen werden per E-Mail oder In-App-Benachrichtigung mitgeteilt. Massgeblich ist jeweils die aktuelle Fassung auf dieser Seite.
agb.recht.titel=12. Anwendbares Recht und Gerichtsstand
agb.recht.text=Es gilt ausschliesslich Schweizer Recht. Gerichtsstand ist der Wohnsitz des Betreibers, sofern das Gesetz keinen anderen zwingenden Gerichtsstand vorsieht.

