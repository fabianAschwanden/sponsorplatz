# Terms and Conditions (Phase 10.3)
agb.titel=Terms and Conditions
agb.geltungsbereich.titel=1. Scope
agb.geltungsbereich.text=These Terms and Conditions govern the use of the platform "Sponsorplatz" (hereinafter "Platform"), operated by Fabian Aschwanden (hereinafter "Operator"). By registering, users accept these terms.
agb.leistungen.titel=2. Services
agb.leistungen.text=The Platform connects associations and organisations in the fields of sports and health with potential sponsors. Sponsorplatz provides the technical infrastructure - the Operator does not become a party to sponsorship agreements between associations and sponsors.
agb.registrierung.titel=3. Registration and Account
agb.registrierung.punkt1=A user account with a valid email address is required for use.
agb.registrierung.punkt2=Registration details must be truthful.
agb.registrierung.punkt3=Each natural person may only have one account.
agb.registrierung.punkt4=The password must be kept confidential. The Operator is not liable for damages resulting from misuse by third parties.
agb.vereine.titel=4. Associations and Organisations
agb.vereine.punkt1=Associations must have a demonstrable connection to sports or health (as per the branch selection during registration).
agb.vereine.punkt2=The Operator reserves the right to verify associations and suspend them in case of violations.
agb.vereine.punkt3=Published content (projects, texts, images) must comply with applicable laws and must not infringe on the rights of third parties.
agb.sponsoren.titel=5. Sponsors
agb.sponsoren.punkt1=Sponsors register as companies and can find projects and submit requests via the marketplace.
agb.sponsoren.punkt2=Sponsorship agreements are concluded directly between the sponsor and the association. The Operator is not liable for the fulfilment of such agreements.
agb.gebuehren.titel=6. Fees
agb.gebuehren.text=Use of the Platform is free during the pilot phase. Should a paid model be introduced, existing users will be notified at least 30 days in advance.
agb.haftung.titel=7. Liability
agb.haftung.punkt1=The Operator is not liable for the accuracy of content posted by users.
agb.haftung.punkt2=Availability of the Platform is ensured on a best-effort basis, but uninterrupted operation cannot be guaranteed.
agb.haftung.punkt3=Damage claims are, to the extent permitted by law, limited to intent and gross negligence.
agb.datenschutz.titel=8. Data Protection
agb.datenschutz.text=For the processing of personal data, our privacy policy applies.
agb.datenschutz.link=- Privacy Policy
agb.inhalte.titel=9. Content and Intellectual Property
agb.inhalte.punkt1=Users retain all rights to their posted content.
agb.inhalte.punkt2=By uploading, users grant the Operator a simple, non-transferable right to display the content on the Platform.
agb.inhalte.punkt3=The Operator may remove obviously unlawful content without prior notice.
agb.kuendigung.titel=10. Termination and Account Deletion
agb.kuendigung.punkt1=Users may request account deletion at any time by emailing the Operator.
agb.kuendigung.punkt2=The Operator may suspend or delete accounts in case of violations of these terms.
agb.kuendigung.punkt3=Ongoing sponsorship agreements are not affected by account deletion.
agb.aenderungen.titel=11. Changes to the Terms
agb.aenderungen.text=The Operator may amend these terms at any time. Significant changes will be communicated by email or in-app notification. The current version on this page is authoritative.
agb.recht.titel=12. Applicable Law and Jurisdiction
agb.recht.text=Swiss law applies exclusively. The place of jurisdiction is the Operator's domicile, unless the law prescribes another mandatory jurisdiction.

