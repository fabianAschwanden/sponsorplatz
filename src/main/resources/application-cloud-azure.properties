# =============================================================================
# Profil: cloud-azure — Azure-Staging-Deployment (Phase 15.3)
# =============================================================================
# Aktivieren via:  SPRING_PROFILES_ACTIVE=cloud-azure
#
# Erbt von prod (gleicher Stack: PostgreSQL, BCrypt, Flyway, Form-Login).
# Unterschiede zu cloud-free:
#   - DB extern: Azure Database for PostgreSQL Flexible Server (privates VNet)
#   - Storage: Azure Blob mit User-Assigned Managed Identity
#   - Image-Quelle: Azure Container Registry
#
# Sensible Werte (DB_PASSWORD, SMTP_PASSWORD, SPONSORPLATZ_ADMIN_PASSWORD)
# kommen aus ENV-Vars im docker-compose auf der VM (nicht im Image).
# =============================================================================

# --- Tomcat-Tuning für Standard_B2s (2 vCPU / 4 GB RAM) ----------------------
server.tomcat.threads.max=80
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=30
server.tomcat.connection-timeout=10s

# Forwarded-Header (Caddy reicht X-Forwarded-Proto/-For weiter)
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# --- HikariCP — Remote-Postgres (Flex Server B1ms = ~25 max_connections) ----
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000

# --- Mail — externer SMTP-Relay (analog cloud-free) -------------------------
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# --- Externe Basis-URL für Mail-Links + OAuth-Redirects ---------------------
sponsorplatz.basis-url=${BASIS_URL:http://localhost}

# --- Storage: Azure Blob via Managed Identity -------------------------------
# Default-Provider ist 'azure' in diesem Profil — kann via ENV überschrieben
# werden (z.B. für lokales Testen mit lokalem Storage).
sponsorplatz.storage.provider=${STORAGE_PROVIDER:azure}
sponsorplatz.storage.lokal.basis-pfad=${STORAGE_PFAD:/app/uploads}

# Auth-Mode: managed-identity (auf Azure-VM via UAMI) | connection-string (Azurite)
sponsorplatz.storage.azure.auth-mode=${AZURE_AUTH_MODE:managed-identity}
sponsorplatz.storage.azure.account-url=${AZURE_ACCOUNT_URL:}
sponsorplatz.storage.azure.connection-string=${AZURE_CONNECTION_STRING:}
sponsorplatz.storage.azure.container-uploads=${AZURE_CONTAINER_UPLOADS:sponsorplatz-uploads}
sponsorplatz.storage.azure.container-backups=${AZURE_CONTAINER_BACKUPS:sponsorplatz-backups}

# --- Logging -----------------------------------------------------------------
logging.level.root=INFO
logging.level.ch.sponsorplatz=INFO
logging.level.com.zaxxer.hikari=INFO
# Azure-SDK ist gesprächig — auf WARN heben
logging.level.com.azure=WARN
logging.level.reactor.netty=WARN

# --- Sicherheit: keine Stack-Traces nach außen ------------------------------
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# --- Aktuator: nur health/info, keine Details für anonyme Aufrufer ----------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# --- Info-Endpoint mit Build-Daten (sichtbar in /actuator/info) -------------
management.info.env.enabled=true
management.info.git.enabled=true
management.info.build.enabled=true

# --- Sentry Error-Tracking --------------------------------------------------
# Aktiv wenn SENTRY_DSN gesetzt (CD-managed via .env, off-by-default).
# Release MUSS vom CD-Workflow als 'sponsorplatz@<git-sha>' gesetzt werden;
# Default ":" liefert leer und lässt Sentry "no release" anzeigen statt zu
# crashen. Environment hardcoded auf die Cloud-Zone — verlässliches Filter-
# Kriterium nach DB-Sync zwischen den Clouds (siehe ADR-0009).
sentry.environment=${SENTRY_ENVIRONMENT:azure-staging}
sentry.release=${SENTRY_RELEASE:}
sentry.send-default-pii=false
sentry.traces-sample-rate=0
