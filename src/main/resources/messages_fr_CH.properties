index.hero.akteur.verein.title=Association.
index.hero.akteur.verein.text=Les associations suisses du sport et de la sant\u00e9 se pr\u00e9sentent avec un profil structur\u00e9 et sont trouv\u00e9es par la CSS \u2014 strictement focalis\u00e9 sur le sport et la sant\u00e9.
index.hero.akteur.css.title=CSS.
index.hero.akteur.css.text=L'\u00e9quipe sponsoring centrale curate la plateforme, examine les demandes de mani\u00e8re homog\u00e8ne et rend l'engagement de la CSS visible.
index.hero.akteur.agentur.title=Agence.
