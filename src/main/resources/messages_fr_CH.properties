index.aufbau.text=Le hub sponsoring CSS est la plateforme curat\u00e9e pour le sponsoring sport et sant\u00e9 de la CSS. Nous n'acceptons que les associations dont la mission s'inscrit clairement dans le domaine du sport ou de la sant\u00e9 \u2014 mouvement, r\u00e9habilitation, sant\u00e9 mentale, nutrition, entraide. Le sponsoring CSS devient ainsi le point de rencontre fiable pour les associations, l'\u00e9quipe sponsoring, les agences r\u00e9gionales et les assur\u00e9s.
