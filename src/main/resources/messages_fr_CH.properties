index.title=Sponsorplatz \u2014 L\u00e0 o\u00f9 les associations et la CSS se rencontrent
index.metaDescription=Sponsorplatz est la plateforme curat\u00e9e qui r\u00e9unit les associations suisses du sport et de la sant\u00e9 et l'\u00e9quipe sponsoring de la CSS. Mouvement, r\u00e9habilitation, sant\u00e9 mentale, nutrition \u2014 tout ce qui maintient la Suisse en bonne sant\u00e9.
index.hero.rubrik=Hub sponsoring CSS \u00b7 Sport et sant\u00e9 \u00b7 Suisse
index.hero.h1.line1=L\u00e0 o\u00f9 les associations et la CSS
index.hero.h1.line2=se rencontrent.
index.hero.claim=Une plateforme. Quatre acteurs. Une mission. Le point de contact curat\u00e9 pour les associations suisses du sport et de la sant\u00e9 et l'\u00e9quipe sponsoring de la CSS \u2014 strictement focalis\u00e9, largement ouvert.
