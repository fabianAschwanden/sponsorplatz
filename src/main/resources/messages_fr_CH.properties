# Conditions g\u00e9n\u00e9rales (Phase 10.3)
agb.titel=Conditions g\u00e9n\u00e9rales (CGV)
agb.geltungsbereich.titel=1. Champ d'application
agb.geltungsbereich.text=Les pr\u00e9sentes conditions g\u00e9n\u00e9rales r\u00e9gissent l'utilisation de la plateforme \u00abSponsorplatz\u00bb (ci-apr\u00e8s \u00abPlateforme\u00bb), exploit\u00e9e par Fabian Aschwanden (ci-apr\u00e8s \u00abExploitant\u00bb). En s'inscrivant, les utilisateurs acceptent ces CGV.
agb.leistungen.titel=2. Prestations de la plateforme
agb.leistungen.text=La plateforme met en relation des associations et organisations du sport et de la sant\u00e9 avec des sponsors potentiels. Sponsorplatz fournit l'infrastructure technique - l'exploitant ne devient pas partie aux accords de sponsoring entre associations et sponsors.
agb.registrierung.titel=3. Inscription et compte
agb.registrierung.punkt1=Un compte utilisateur avec une adresse e-mail valide est n\u00e9cessaire.
agb.registrierung.punkt2=Les informations fournies lors de l'inscription doivent \u00eatre v\u00e9ridiques.
agb.registrierung.punkt3=Chaque personne physique ne peut avoir qu'un seul compte.
agb.registrierung.punkt4=Le mot de passe doit \u00eatre gard\u00e9 confidentiel. L'exploitant n'est pas responsable des dommages caus\u00e9s par des tiers.
agb.vereine.titel=4. Associations et organisations
agb.vereine.punkt1=Les associations doivent avoir un lien d\u00e9montrable avec le sport ou la sant\u00e9 (selon la branche choisie lors de l'inscription).
agb.vereine.punkt2=L'exploitant se r\u00e9serve le droit de v\u00e9rifier les associations et de les suspendre en cas d'infraction.
agb.vereine.punkt3=Les contenus publi\u00e9s (projets, textes, images) doivent respecter les lois en vigueur et ne pas porter atteinte aux droits de tiers.
agb.sponsoren.titel=5. Sponsors
agb.sponsoren.punkt1=Les sponsors s'inscrivent en tant qu'entreprises et peuvent trouver des projets et soumettre des demandes via le march\u00e9.
agb.sponsoren.punkt2=Les accords de sponsoring sont conclus directement entre le sponsor et l'association. L'exploitant n'est pas responsable de l'ex\u00e9cution de ces accords.
agb.gebuehren.titel=6. Frais
agb.gebuehren.text=L'utilisation de la plateforme est gratuite pendant la phase pilote. En cas d'introduction d'un mod\u00e8le payant, les utilisateurs existants seront inform\u00e9s au moins 30 jours \u00e0 l'avance.
agb.haftung.titel=7. Responsabilit\u00e9
agb.haftung.punkt1=L'exploitant n'est pas responsable de l'exactitude des contenus publi\u00e9s par les utilisateurs.
agb.haftung.punkt2=La disponibilit\u00e9 de la plateforme est assur\u00e9e au mieux, mais un fonctionnement ininterrompu ne peut \u00eatre garanti.
agb.haftung.punkt3=Les demandes de dommages-int\u00e9r\u00eats sont, dans la mesure permise par la loi, limit\u00e9es au dol et \u00e0 la faute grave.
agb.datenschutz.titel=8. Protection des donn\u00e9es
agb.datenschutz.text=Pour le traitement des donn\u00e9es personnelles, notre d\u00e9claration de protection des donn\u00e9es s'applique.
agb.datenschutz.link=- D\u00e9claration de protection des donn\u00e9es
agb.inhalte.titel=9. Contenus et propri\u00e9t\u00e9 intellectuelle
agb.inhalte.punkt1=Les utilisateurs conservent tous les droits sur leurs contenus publi\u00e9s.
agb.inhalte.punkt2=Par le t\u00e9l\u00e9chargement, les utilisateurs accordent \u00e0 l'exploitant un droit d'utilisation simple et non transf\u00e9rable pour l'affichage sur la plateforme.
agb.inhalte.punkt3=L'exploitant peut supprimer sans pr\u00e9avis les contenus manifestement illicites.
agb.kuendigung.titel=10. R\u00e9siliation et suppression du compte
agb.kuendigung.punkt1=Les utilisateurs peuvent demander la suppression de leur compte \u00e0 tout moment par e-mail \u00e0 l'exploitant.
agb.kuendigung.punkt2=L'exploitant peut suspendre ou supprimer des comptes en cas de violation de ces CGV.
agb.kuendigung.punkt3=Les accords de sponsoring en cours ne sont pas affect\u00e9s par la suppression du compte.
agb.aenderungen.titel=11. Modifications des CGV
agb.aenderungen.text=L'exploitant peut modifier ces CGV \u00e0 tout moment. Les modifications importantes seront communiqu\u00e9es par e-mail ou notification in-app. La version actuelle sur cette page fait foi.
agb.recht.titel=12. Droit applicable et for juridique
agb.recht.text=Le droit suisse s'applique exclusivement. Le for juridique est le domicile de l'exploitant, sauf si la loi pr\u00e9voit un autre for imp\u00e9ratif.

