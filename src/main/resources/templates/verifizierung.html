<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>E-Mail-Verifizierung — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <header class="kopfzeile">
        <div class="container">
            <a class="logo" th:href="@{/}">Sponsorplatz</a>
        </div>
    </header>

    <main class="hauptbereich">
        <div class="container">
            <div th:if="${erfolg}">
                <h1>✓ E-Mail bestätigt!</h1>
                <p>Ihre E-Mail-Adresse wurde erfolgreich verifiziert. Sie können sich jetzt anmelden.</p>
                <a th:href="@{/login}" class="btn btn-primaer">Zur Anmeldung</a>
            </div>
            <div th:unless="${erfolg}">
                <h1>Verifizierung fehlgeschlagen</h1>
                <p th:text="${fehlermeldung}">Fehler</p>
                <a th:href="@{/login}" class="btn">Zur Anmeldung</a>
            </div>
        </div>
    </main>

    <footer class="fusszeile">
        <div class="container">
            <p>&copy; 2026 Sponsorplatz</p>
        </div>
    </footer>
</body>
</html>
