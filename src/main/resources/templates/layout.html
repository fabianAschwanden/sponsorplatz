<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${seitentitel} ?: 'Sponsorplatz'">Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body>
    <header class="kopfzeile">
        <div class="container">
            <a class="logo" th:href="@{/}">Sponsorplatz</a>
            <nav class="navigation">
                <a th:href="@{/}" th:classappend="${aktiveSeite == 'home'} ? 'aktiv'" th:text="#{navigation.start}">Start</a>
                <a th:href="@{/marktplatz}" th:classappend="${aktiveSeite == 'marktplatz'} ? 'aktiv'"
                   th:text="#{navigation.marktplatz}">Marktplatz</a>
                <a th:href="@{/login}" class="cta" th:text="#{navigation.anmelden}">Anmelden</a>
            </nav>
        </div>
    </header>

    <main class="hauptbereich">
        <div th:replace="~{::haupt-inhalt}">
            Default-Inhalt — wird durch Seiten überschrieben
        </div>
    </main>

    <footer class="fusszeile">
        <div class="container">
            <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Sponsorplatz · Schweiz</p>
            <nav>
                <a th:href="@{/impressum}" th:text="#{footer.impressum}">Impressum</a>
                <a th:href="@{/datenschutz}" th:text="#{footer.datenschutz}">Datenschutz</a>
                <a th:href="@{/agb}" th:text="#{layout.agb}">AGB</a>
            </nav>
        </div>
    </footer>
<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
