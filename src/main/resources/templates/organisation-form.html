<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${bearbeitenSlug != null} ? 'Organisation bearbeiten' : 'Neue Organisation'">Organisation</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('organisationen', ${anzahlOffeneAnfragen})}"></aside>

    <main class="app-main">
        <header class="app-page-head">
            <div>
                <p class="app-page-rubrik">Organisation</p>
                <h1 th:text="${bearbeitenSlug != null} ? 'Organisation bearbeiten' : 'Neue Organisation'">Neue Organisation</h1>
            </div>
        </header>

        <div th:if="${fehlermeldung}" class="app-meldung fehler" th:text="${fehlermeldung}"></div>

        <section class="app-card">
            <form th:action="${bearbeitenSlug != null} ? @{/organisationen/{slug}(slug=${bearbeitenSlug})} : @{/organisationen}"
                  method="post" th:object="${orgForm}" class="app-form" novalidate>

                <div class="app-form-group">
                    <label for="typ">Typ *</label>
                    <select id="typ" th:field="*{typ}">
                        <option value="">— wählen —</option>
                        <option th:each="t : ${typen}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <p class="app-meldung fehler" th:if="${#fields.hasErrors('typ')}" th:errors="*{typ}"></p>
                </div>

                <div class="app-form-group">
                    <label for="name">Name *</label>
                    <input id="name" type="text" th:field="*{name}" required>
                    <p class="app-meldung fehler" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div class="app-form-group">
                    <label for="slug">Slug</label>
                    <span class="hint">Optional — wird sonst aus dem Namen generiert</span>
                    <input id="slug" type="text" th:field="*{slug}" placeholder="z. B. fc-beispiel">
                    <p class="app-meldung fehler" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></p>
                </div>

                <div class="app-form-group">
                    <label for="rechtsform">Rechtsform</label>
                    <input id="rechtsform" type="text" th:field="*{rechtsform}" placeholder="z. B. Verein, AG, GmbH">
                </div>

                <div class="app-form-group">
                    <label for="branche">Branche</label>
                    <input id="branche" type="text" th:field="*{branche}" placeholder="z. B. SPORT, KULTUR">
                </div>

                <div class="app-form-group">
                    <label for="beschreibung">Beschreibung</label>
                    <textarea id="beschreibung" th:field="*{beschreibung}" rows="4"></textarea>
                </div>

                <div class="app-form-group">
                    <label for="websiteUrl">Website</label>
                    <input id="websiteUrl" type="url" th:field="*{websiteUrl}" placeholder="https://...">
                    <p class="app-meldung fehler" th:if="${#fields.hasErrors('websiteUrl')}" th:errors="*{websiteUrl}"></p>
                </div>

                <div class="app-form-actions">
                    <button type="submit" class="app-btn">Speichern</button>
                    <a th:href="@{/organisationen}" class="app-btn app-btn-secondary">Abbrechen</a>
                </div>
            </form>
        </section>
    </main>
</div>

</body>
</html>
