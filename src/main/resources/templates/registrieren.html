<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="public-body">

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a class="public-logo" th:href="@{/}">
            <span class="dash-logo-mark">SP</span>
            <span>Sponsorplatz</span>
        </a>
        <nav class="public-nav">
            <a th:href="@{/marktplatz}">Marktplatz</a>
            <a th:href="@{/login}">Anmelden</a>
        </nav>
    </div>
</header>

<main class="public-main">
    <section class="public-auth-card">
        <h1>Konto erstellen</h1>

        <div th:if="${fehlermeldung}" class="app-meldung fehler" th:text="${fehlermeldung}"></div>

        <form th:action="@{/registrieren}" th:object="${userForm}" method="post" class="app-form">
            <div class="app-form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" th:field="*{email}" required autofocus>
                <p class="app-meldung fehler" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>
            <div class="app-form-group">
                <label for="anzeigename">Anzeigename</label>
                <input type="text" id="anzeigename" th:field="*{anzeigename}" required>
                <p class="app-meldung fehler" th:if="${#fields.hasErrors('anzeigename')}" th:errors="*{anzeigename}"></p>
            </div>
            <div class="app-form-group">
                <label for="passwort">Passwort</label>
                <span class="hint">Mindestens 8 Zeichen</span>
                <input type="password" id="passwort" th:field="*{passwort}" required>
                <p class="app-meldung fehler" th:if="${#fields.hasErrors('passwort')}" th:errors="*{passwort}"></p>
            </div>
            <div class="app-form-actions">
                <button type="submit" class="app-btn" style="width: 100%; justify-content: center;">Registrieren</button>
            </div>
        </form>

        <p class="public-auth-foot">
            Bereits ein Konto? <a th:href="@{/login}">Anmelden</a>
        </p>
    </section>
</main>

<footer class="public-footer">
    <div class="public-footer-inner">
        <p style="margin:0;">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Sponsorplatz</p>
    </div>
</footer>

</body>
</html>
