<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neues Passwort — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="public-body">

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a class="public-logo" th:href="@{/}">
            <img class="dash-logo-icon" th:src="@{/images/logo/icon-ringe.svg}" alt="">
            <span>Sponsorplatz</span>
        </a>
        <nav class="public-nav">
            <a th:href="@{/marktplatz}">Marktplatz</a>
            <a th:href="@{/login}">Anmelden</a>
        </nav>
    </div>
</header>

<main class="public-main">
    <section class="public-auth-card">
        <h1>Neues Passwort setzen</h1>

        <div th:if="${fehlermeldung}" class="app-meldung fehler" th:text="${fehlermeldung}"></div>

        <form th:action="@{/passwort-reset}" method="post" class="app-form">
            <input type="hidden" name="token" th:value="${token}">
            <div class="app-form-group">
                <label for="neuesPasswort">Neues Passwort</label>
                <span class="hint">Mindestens 8 Zeichen</span>
                <input type="password" id="neuesPasswort" name="neuesPasswort" required minlength="8" autofocus>
            </div>
            <div class="app-form-group">
                <label for="passwortBestaetigung">Passwort bestätigen</label>
                <input type="password" id="passwortBestaetigung" name="passwortBestaetigung" required minlength="8">
            </div>
            <div class="app-form-actions">
                <button type="submit" class="app-btn" style="width: 100%; justify-content: center;">Passwort setzen</button>
            </div>
        </form>

        <p class="public-auth-foot">
            <a th:href="@{/login}">Zurück zur Anmeldung</a>
        </p>
    </section>
</main>

<footer class="public-footer">
    <div class="public-footer-inner">
        <p style="margin:0;">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Sponsorplatz</p>
    </div>
</footer>

</body>
</html>
