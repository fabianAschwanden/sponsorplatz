<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Marktplatz — Sponsorplatz</title>
    <meta name="description" content="Sponsoring-Projekte von Schweizer Vereinen entdecken.">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header>
    <nav>
        <a th:href="@{/}">Sponsorplatz</a> &gt;
        <span>Marktplatz</span>
    </nav>
</header>
<main>
    <h1>Sponsoring-Marktplatz</h1>
    <p>Entdecken Sie aktuelle Sponsoring-Möglichkeiten von Schweizer Vereinen und Organisationen.</p>

    <!-- Filter -->
    <form th:action="@{/marktplatz}" method="get" class="filter-form">
        <div>
            <label for="kategorie">Kategorie</label>
            <input type="text" id="kategorie" name="kategorie" th:value="${filterKategorie}" placeholder="z.B. Sport, Kultur">
        </div>
        <div>
            <label for="ort">Ort</label>
            <input type="text" id="ort" name="ort" th:value="${filterOrt}" placeholder="z.B. Zürich">
        </div>
        <button type="submit" class="btn">Filtern</button>
        <a th:href="@{/marktplatz}" class="btn-link">Zurücksetzen</a>
    </form>

    <!-- Ergebnisse -->
    <section th:if="${!projekte.isEmpty()}" class="projekt-grid">
        <article th:each="p : ${projekte}" class="projekt-card">
            <h2><a th:href="@{'/marktplatz/' + ${p.slug}}" th:text="${p.name}">Projekt</a></h2>
            <p th:if="${p.kategorie}" th:text="'Kategorie: ' + ${p.kategorie}"></p>
            <p th:if="${p.ort}" th:text="'Ort: ' + ${p.ort}"></p>
            <p th:if="${p.beschreibung}" th:text="${#strings.abbreviate(p.beschreibung, 150)}"></p>
        </article>
    </section>

    <p th:if="${projekte.isEmpty()}">Aktuell keine veröffentlichten Projekte vorhanden.</p>
</main>
</body>
</html>
