<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${org.name() + ' — Sponsorplatz'}">Vereinsprofil</title>
    <meta name="description" th:content="${org.beschreibung() != null ? #strings.abbreviate(org.beschreibung(), 160) : org.name()}">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" th:content="${org.name() + ' — Sponsorplatz'}">
    <meta property="og:description"
          th:content="${org.beschreibung() != null ? #strings.abbreviate(org.beschreibung(), 200) : org.name() + ' auf Sponsorplatz'}">
    <meta property="og:site_name" content="Sponsorplatz">
    <meta property="og:locale" content="de_CH">
    <meta property="og:image" th:content="@{/og/verein/{slug}.png(slug=${org.slug()})}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${org.name() + ' — Sponsorplatz'}">
    <meta name="twitter:description"
          th:content="${org.beschreibung() != null ? #strings.abbreviate(org.beschreibung(), 200) : org.name() + ' auf Sponsorplatz'}">
    <meta name="twitter:image" th:content="@{/og/verein/{slug}.png(slug=${org.slug()})}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">
<div class="app-layout">

    <aside th:replace="~{fragments/sidebar :: app-sidebar('marktplatz', ${anzahlOffeneAnfragen})}"></aside>

    <main class="app-main">
    <nav style="font-size:0.85rem; color:#6b7280; margin-bottom:1rem;">
        <a th:href="@{/}" style="color:inherit;">Sponsorplatz</a> &gt;
        <a th:href="@{/marktplatz}" th:text="#{navigation.marktplatz}" style="color:inherit;">Marktplatz</a> &gt;
        <span th:text="${org.name()}">Verein</span>
    </nav>
    <!-- Health-Hero mit Branche-Chip -->
    <div class="verein-hero" style="margin-bottom:2rem;">
        <h1 th:text="${org.name()}">Vereinsname</h1>
        <div th:if="${org.branche()}" style="margin-top:0.5rem;">
            <a class="health-hero-chip"
               th:href="@{/marktplatz(branche=${org.branche().name()})}"
               th:text="${org.branche().anzeige}">Branche</a>
            <p class="health-subhead" th:text="${org.branche().beschreibung}">Beschreibung</p>
        </div>
    </div>

    <dl>
        <dt th:text="#{vereinProfil.feld.typ}">Typ</dt>
        <dd th:text="${org.typ()}">VEREIN</dd>
        <!-- Branche bewusst nicht doppelt: prominent oben im Hero-Chip + Subhead -->
        <dt th:text="#{vereinProfil.feld.rechtsform}">Rechtsform</dt>
        <dd th:text="${org.rechtsform() ?: '-'}">-</dd>
        <dt th:if="${org.websiteUrl()}" th:text="#{vereinProfil.feld.website}">Website</dt>
        <dd th:if="${org.websiteUrl()}"><a th:href="${org.websiteUrl()}" th:text="${org.websiteUrl()}" target="_blank">URL</a></dd>
    </dl>

    <div th:if="${org.beschreibung()}">
        <h2 th:text="#{vereinProfil.ueberUns}">Über uns</h2>
        <p th:text="${org.beschreibung()}">Beschreibung</p>
    </div>

    <section th:if="${!projekte.isEmpty()}">
        <h2 th:text="#{vereinProfil.aktuelleProjekte}">Aktuelle Projekte</h2>
        <div th:each="p : ${projekte}" class="card">
            <h3><a th:href="@{'/marktplatz/' + ${p.slug}}" th:text="${p.name}">Projekt</a></h3>
            <p th:if="${p.kategorie}">
                <span th:text="#{vereinProfil.feld.kategoriePrefix}">Kategorie:</span>
                <span th:text="${p.kategorie}"></span>
            </p>
            <p th:if="${p.ort}">
                <span th:text="#{vereinProfil.feld.ortPrefix}">Ort:</span>
                <span th:text="${p.ort}"></span>
            </p>
        </div>
    </section>

    <p th:if="${projekte.isEmpty()}" th:text="#{vereinProfil.keineProjekte}">Dieser Verein hat aktuell keine veröffentlichten Projekte.</p>
    </main>
</div>
<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
