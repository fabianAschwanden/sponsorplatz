<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{watchlist.titel} + ' — Sponsorplatz'">Watchlist — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
</head>
<body class="dashboard-body">
<div class="dashboard-layout">

    <aside th:replace="~{fragments/sidebar :: app-sidebar('watchlist', null)}"></aside>

    <main class="dash-main">
    <h1 th:text="#{watchlist.titel}">Meine Watchlist</h1>

    <div th:if="${erfolgsMeldung}" class="alert success" th:text="${erfolgsMeldung}"></div>

    <div th:if="${eintraege.isEmpty()}" class="empty-state">
        <p th:text="#{watchlist.empty}">Noch keine Projekte gemerkt.</p>
        <a th:href="@{/marktplatz}" class="btn" th:text="#{watchlist.empty.btn}">Marktplatz durchstöbern</a>
    </div>

    <div th:each="e : ${eintraege}" class="card">
        <h3><a th:href="@{'/marktplatz/' + ${e.projekt.slug}}" th:text="${e.projekt.name}">Projekt</a></h3>
        <p th:if="${e.projekt.kategorie}">
            <span th:text="#{vereinProfil.feld.kategoriePrefix}">Kategorie:</span>
            <span th:text="${e.projekt.kategorie}"></span>
        </p>
        <p th:if="${e.projekt.ort}">
            <span th:text="#{vereinProfil.feld.ortPrefix}">Ort:</span>
            <span th:text="${e.projekt.ort}"></span>
        </p>
        <form th:action="@{'/watchlist/entfernen/' + ${e.projekt.slug}}" method="post" style="margin-top:0.5em">
            <button type="submit" class="btn btn-danger btn-sm" th:text="#{watchlist.entfernen}">Entfernen</button>
        </form>
    </div>
    </main>
</div>
<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
