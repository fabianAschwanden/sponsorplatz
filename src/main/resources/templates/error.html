<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.titel} + ' — Sponsorplatz'">Fehler — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="public-body">

<header class="public-topbar">
    <div class="public-topbar-inner">
        <a class="public-logo" th:href="@{/}">
            <img class="dash-logo-icon" th:src="@{/images/logo/icon-ringe.svg}" alt="">
            <span>Sponsorplatz</span>
        </a>
    </div>
</header>

<main class="public-main">
    <section class="public-auth-card" style="max-width: 540px;">
        <p class="public-hero-rubrik" style="text-align:center;" th:text="#{error.titel}">Fehler</p>
        <h1 style="text-align:center;" th:text="${status} ?: #{error.titel}">Etwas ist schiefgelaufen</h1>
        <p class="app-muted" style="text-align:center;" th:text="${error}"></p>
        <p class="app-muted" style="text-align:center;" th:if="${message}" th:text="${message}"></p>
        <div class="app-form-actions" style="margin-top: 1.5rem;">
            <a th:href="@{/}" class="app-btn" style="width: 100%; justify-content: center;"
               th:text="#{error.zurueckLink}">Zur Startseite</a>
        </div>
    </section>
</main>

<footer class="public-footer">
    <div class="public-footer-inner">
        <p style="margin:0;">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Sponsorplatz</p>
    </div>
</footer>

<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
