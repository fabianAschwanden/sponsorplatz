<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{orgForm.title.neu} + ' — Sponsorplatz'">Organisation anlegen — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="dashboard-body">
<div class="dashboard-layout">

    <aside th:replace="~{fragments/sidebar :: app-sidebar('organisationen', null)}"></aside>

    <main class="dash-main">
    <header class="dash-page-head" style="margin-bottom:1.5rem;">
        <p class="dash-page-rubrik" th:text="#{orgTyp.schritt}">Schritt 1 von 2</p>
        <h1 class="dash-page-title" th:text="#{orgTyp.h1}">Was für eine Organisation legst du an?</h1>
        <p class="dash-page-lead app-muted" th:text="#{orgTyp.text}" style="max-width:60ch;">Die folgenden Felder unterscheiden sich je nach Typ…</p>
    </header>

    <section class="dash-section">
        <div class="typ-grid">
            <a th:href="@{/organisationen/neu(typ='VEREIN')}" class="typ-card typ-card-verein">
                <div class="typ-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="7" r="3"/>
                        <circle cx="17" cy="9" r="2.5"/>
                        <path d="M3 20c0-3 2.5-5 6-5s6 2 6 5"/>
                        <path d="M14 20c0-2 1.5-4 4-4s3 1 3 3"/>
                    </svg>
                </div>
                <div class="typ-card-body">
                    <h2 class="typ-card-titel" th:text="#{orgTyp.verein.titel}">Verein</h2>
                    <p class="typ-card-text" th:text="#{orgTyp.verein.text}">…</p>
                </div>
                <span class="typ-card-pfeil" aria-hidden="true">→</span>
            </a>

            <a th:href="@{/organisationen/neu(typ='UNTERNEHMEN')}" class="typ-card typ-card-unternehmen">
                <div class="typ-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21V8l9-5 9 5v13"/>
                        <path d="M9 21v-6h6v6"/>
                        <path d="M7 11h.01M12 11h.01M17 11h.01"/>
                    </svg>
                </div>
                <div class="typ-card-body">
                    <h2 class="typ-card-titel" th:text="#{orgTyp.unternehmen.titel}">Unternehmen / Sponsor</h2>
                    <p class="typ-card-text" th:text="#{orgTyp.unternehmen.text}">…</p>
                </div>
                <span class="typ-card-pfeil" aria-hidden="true">→</span>
            </a>

            <a th:href="@{/organisationen/neu(typ='STIFTUNG')}" class="typ-card typ-card-stiftung">
                <div class="typ-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 21s-7-5-7-11a5 5 0 0 1 9-3 5 5 0 0 1 9 3c0 6-7 11-7 11z" transform="translate(-2 0)"/>
                    </svg>
                </div>
                <div class="typ-card-body">
                    <h2 class="typ-card-titel" th:text="#{orgTyp.stiftung.titel}">Stiftung</h2>
                    <p class="typ-card-text" th:text="#{orgTyp.stiftung.text}">…</p>
                </div>
                <span class="typ-card-pfeil" aria-hidden="true">→</span>
            </a>

            <a th:href="@{/organisationen/neu(typ='ANDERE')}" class="typ-card typ-card-andere">
                <div class="typ-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 1.5-2.5 2-2.5 3.5"/>
                        <circle cx="12" cy="17" r="0.5" fill="currentColor"/>
                    </svg>
                </div>
                <div class="typ-card-body">
                    <h2 class="typ-card-titel" th:text="#{orgTyp.andere.titel}">Andere</h2>
                    <p class="typ-card-text" th:text="#{orgTyp.andere.text}">…</p>
                </div>
                <span class="typ-card-pfeil" aria-hidden="true">→</span>
            </a>
        </div>

        <div class="typ-grid-footer">
            <a th:href="@{/organisationen}" class="app-btn app-btn-secondary" th:text="#{allgemein.abbrechen}">Abbrechen</a>
        </div>
    </section>
    </main>
</div>

<style>
    /* Typ-Auswahl — Cards für Org-Typ-Wahl */
    .dash-page-head { margin-bottom: 1.5rem; }
    .dash-page-rubrik {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--dash-muted);
        margin: 0 0 0.4rem;
        font-weight: 600;
    }
    .dash-page-title {
        font-family: var(--dash-font-head);
        font-size: 1.85rem;
        line-height: 1.2;
        margin: 0 0 0.5rem;
        color: var(--dash-text);
    }
    .dash-page-lead {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.55;
    }

    .typ-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }
    @media (max-width: 720px) {
        .typ-grid { grid-template-columns: 1fr; }
    }

    .typ-card {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 1.1rem;
        align-items: center;
        background: var(--dash-card);
        border: 1px solid var(--dash-border);
        border-radius: var(--dash-radius);
        padding: 1.25rem 1.4rem;
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        position: relative;
    }
    .typ-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(40, 30, 80, 0.08);
        border-color: var(--dash-violet);
    }
    .typ-card:focus-visible {
        outline: none;
        border-color: var(--dash-violet-dark);
        box-shadow: 0 0 0 3px var(--dash-violet-light);
    }

    .typ-card-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
    }
    .typ-card-verein .typ-card-icon  { background: var(--dash-coral-light); color: var(--dash-coral); }
    .typ-card-unternehmen .typ-card-icon { background: var(--dash-violet-light); color: var(--dash-violet-dark); }
    .typ-card-stiftung .typ-card-icon { background: #E6F0E5; color: #4F7C4D; }
    .typ-card-andere .typ-card-icon   { background: #F1ECE2; color: #8A7B5A; }

    .typ-card-body { min-width: 0; }
    .typ-card-titel {
        font-family: var(--dash-font-head);
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0 0 0.3rem;
        color: var(--dash-text);
    }
    .typ-card-text {
        margin: 0;
        font-size: 0.88rem;
        line-height: 1.5;
        color: var(--dash-muted);
    }

    .typ-card-pfeil {
        font-size: 1.4rem;
        color: var(--dash-muted);
        transition: transform 0.15s ease, color 0.15s ease;
        flex-shrink: 0;
    }
    .typ-card:hover .typ-card-pfeil {
        color: var(--dash-violet-dark);
        transform: translateX(4px);
    }

    .typ-grid-footer {
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--dash-border);
        display: flex;
        justify-content: flex-start;
    }
</style>
<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
