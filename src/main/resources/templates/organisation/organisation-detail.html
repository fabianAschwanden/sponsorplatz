<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${org.name} + ' — Sponsorplatz'">Organisation</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('organisationen', ${anzahlOffeneAnfragen})}"></aside>

    <main class="app-main">
        <header class="app-page-head">
            <div style="display:flex; gap:1rem; align-items:center;">
                <img th:if="${org.logoUrl}" th:src="${org.logoUrl}"
                     th:alt="|#{orgDetail.logo.alt} ${org.name}|"
                     class="org-logo-head">
                <div>
                    <p class="app-page-rubrik" th:text="${org.typ}">VEREIN</p>
                    <h1 th:text="${org.name}">Name</h1>
                </div>
            </div>
            <div style="display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
                <!-- Admin-Direkt-Aktion: PENDING-Org verifizieren, ohne über /admin/verifizierungen zu gehen.
                     Sichtbar nur für PLATFORM_ADMIN, wenn der Status PENDING ist. -->
                <th:block sec:authorize="hasRole('PLATFORM_ADMIN')" th:if="${org.status == T(ch.sponsorplatz.organisation.OrgStatus).PENDING}">
                    <form th:action="@{/admin/verifizierungen/{id}/verifizieren(id=${org.id})}" method="post" style="margin:0;">
                        <button type="submit" class="app-btn" th:text="#{orgDetail.aktion.verifizieren}">✓ Verifizieren</button>
                    </form>
                    <form th:action="@{/admin/verifizierungen/{id}/ablehnen(id=${org.id})}" method="post" style="margin:0;"
                          onsubmit="return confirm('Diese Organisation wirklich ablehnen?');">
                        <button type="submit" class="app-btn app-btn-danger" th:text="#{orgDetail.aktion.ablehnen}">Ablehnen</button>
                    </form>
                </th:block>
                <a th:if="${kannCrmSehen}" th:href="@{/crm/{slug}(slug=${org.slug})}" class="app-btn"
                   th:text="#{crm.crmButton}">CRM-Portfolio</a>
                <a th:href="@{/organisationen/{slug}/mitglieder(slug=${org.slug})}" class="app-btn-secondary app-btn"
                   th:text="#{orgDetail.aktion.mitglieder}">Mitglieder</a>
                <a th:href="@{/organisationen/{slug}/projekte(slug=${org.slug})}" class="app-btn-secondary app-btn"
                   th:text="#{orgDetail.aktion.projekte}">Projekte</a>
                <a th:href="@{/organisationen/{slug}/bearbeiten(slug=${org.slug})}" class="app-btn"
                   th:text="#{orgDetail.aktion.bearbeiten}">Bearbeiten</a>
            </div>
        </header>

        <div th:if="${erfolgsMeldung}" class="app-meldung erfolg" th:text="${erfolgsMeldung}"></div>

        <section class="app-card">
            <dl class="app-datenliste">
                <dt th:text="#{orgDetail.feld.slug}">Slug</dt>
                <dd><code th:text="${org.slug}">slug</code></dd>

                <dt th:text="#{orgDetail.feld.status}">Status</dt>
                <dd>
                    <span class="app-status" th:classappend="${'status-' + #strings.toLowerCase(org.status)}"
                          th:text="${org.status}">PENDING</span>
                </dd>

                <th:block th:if="${org.rechtsform}">
                    <dt th:text="#{orgDetail.feld.rechtsform}">Rechtsform</dt>
                    <dd th:text="${org.rechtsform}"></dd>
                </th:block>

                <th:block th:if="${org.branche}">
                    <dt th:text="#{orgDetail.feld.branche}">Branche</dt>
                    <dd th:text="${org.branche.anzeige}"></dd>
                </th:block>

                <th:block th:if="${org.sponsorBranche}">
                    <dt th:text="#{orgDetail.feld.industrie}">Industrie</dt>
                    <dd th:text="${org.sponsorBranche.anzeige}"></dd>
                </th:block>

                <th:block th:if="${org.websiteUrl}">
                    <dt th:text="#{orgDetail.feld.website}">Website</dt>
                    <dd>
                        <a th:href="${org.websiteUrl}" target="_blank" rel="noopener" th:text="${org.websiteUrl}"></a>
                    </dd>
                </th:block>

                <th:block th:if="${org.beschreibung}">
                    <dt th:text="#{orgDetail.feld.beschreibung}">Beschreibung</dt>
                    <dd th:text="${org.beschreibung}"></dd>
                </th:block>

                <!-- Hierarchie-Übersicht: Eltern-Kette + Sub-Orgs nur rendern,
                     wenn überhaupt Hierarchie da ist (Eltern ODER Kinder). -->
                <th:block th:if="${(elternkette != null and elternkette.size() > 1) or
                                  (untergeordneteOrgs != null and !untergeordneteOrgs.isEmpty())}">
                    <dt th:text="#{orgDetail.feld.hierarchie}">Hierarchie</dt>
                    <dd>
                        <div class="hierarchie-tree">
                            <!-- Elternkette von Wurzel bis aktuelle Org.
                                 Letzter Eintrag = aktuelle Org → h-aktiv. -->
                            <div th:each="eintrag, stat : ${elternkette}"
                                 class="h-knoten"
                                 th:classappend="${stat.last} ? ' h-aktiv' : ''"
                                 th:style="|--h-tiefe: ${stat.index};|">
                                <span class="h-zweig" th:if="${stat.index > 0}" aria-hidden="true">└─</span>
                                <a th:unless="${stat.last}"
                                   th:href="@{/organisationen/{slug}(slug=${eintrag.slug})}"
                                   th:text="${eintrag.name}">Konzern AG</a>
                                <span th:if="${stat.last}"
                                      class="h-aktuell"
                                      th:text="${eintrag.name}">FC Beispiel</span>
                                <span th:if="${stat.last}" class="h-marker app-muted"
                                      th:text="#{orgDetail.hierarchie.dieseOrg}">(diese Org)</span>
                            </div>

                            <!-- Untergeordnete Orgs eine Stufe tiefer als die aktuelle -->
                            <div th:each="sub : ${untergeordneteOrgs}"
                                 class="h-knoten h-kind"
                                 th:style="|--h-tiefe: ${elternkette.size()};|">
                                <span class="h-zweig" aria-hidden="true">└─</span>
                                <a th:href="@{/organisationen/{slug}(slug=${sub.slug})}"
                                   th:text="${sub.name}">Tochter GmbH</a>
                                <span class="app-muted" th:text="|(${sub.typ.name()})|">(UNTERNEHMEN)</span>
                            </div>
                        </div>
                    </dd>
                </th:block>

                <dt th:text="#{orgDetail.feld.registriert}">Registriert am</dt>
                <dd th:text="${#temporals.format(org.registriertAm, 'dd.MM.yyyy HH:mm')}">01.01.2026</dd>

                <th:block th:if="${org.verifiziertAm}">
                    <dt th:text="#{orgDetail.feld.verifiziert}">Verifiziert am</dt>
                    <dd th:text="${#temporals.format(org.verifiziertAm, 'dd.MM.yyyy')}"></dd>
                </th:block>
            </dl>
        </section>

        <!-- Logo-Verwaltung — nur für Editoren der Org. Upload via MedienController
             (/organisationen/{slug}/medien, assetTyp=LOGO). -->
        <section th:if="${kannEditieren}" class="app-card">
            <h2 class="app-section-title" th:text="#{orgDetail.logo.titel}">Logo</h2>

            <div style="display:flex; gap:1.5rem; align-items:flex-start; flex-wrap:wrap;">
                <div th:if="${org.logoUrl}" style="text-align:center;">
                    <img th:src="${org.logoUrl}" th:alt="|#{orgDetail.logo.alt} ${org.name}|"
                         class="org-logo-vorschau">
                    <form th:action="@{/medien/{id}/loeschen(id=${#strings.substringAfter(org.logoUrl, '/medien/')})}"
                          method="post" style="margin-top:0.5rem;"
                          onsubmit="return confirm(this.querySelector('.confirm-msg').textContent);">
                        <span class="confirm-msg" hidden th:text="#{orgDetail.logo.loeschen.bestaetigung}"></span>
                        <button type="submit" class="app-btn app-btn-danger app-btn-sm"
                                th:text="#{orgDetail.logo.loeschen}">Logo entfernen</button>
                    </form>
                </div>

                <form th:action="@{/organisationen/{slug}/medien(slug=${org.slug})}"
                      method="post" enctype="multipart/form-data"
                      style="flex:1; min-width:240px;">
                    <input type="hidden" name="assetTyp" value="LOGO">
                    <label for="logo-datei" class="app-label"
                           th:text="${org.logoUrl} ? #{orgDetail.logo.ersetzen} : #{orgDetail.logo.hochladen}">Logo hochladen</label>
                    <input id="logo-datei" type="file" name="datei" accept="image/png,image/jpeg,image/svg+xml,image/webp"
                           required class="app-input">
                    <p class="app-muted" style="margin:0.35rem 0 0.75rem; font-size:0.85rem;"
                       th:text="#{orgDetail.logo.hinweis}">PNG, JPG, SVG oder WebP.</p>
                    <button type="submit" class="app-btn" th:text="#{orgDetail.logo.speichern}">Hochladen</button>
                </form>
            </div>
        </section>

        <form th:action="@{/organisationen/{slug}/loeschen(slug=${org.slug})}"
              method="post"
              onsubmit="return confirm(this.querySelector('.confirm-msg').textContent);">
            <span class="confirm-msg" hidden th:text="#{orgDetail.loeschen.bestaetigung}"></span>
            <button type="submit" class="app-btn app-btn-danger" th:text="#{orgDetail.loeschen}">Organisation löschen</button>
        </form>
    </main>
</div>

<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
