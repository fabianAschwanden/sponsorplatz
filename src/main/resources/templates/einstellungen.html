<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Einstellungen</title>
</head>
<body>
<main layout:fragment="inhalt">
    <div class="container">
        <h1>Einstellungen</h1>

        <div th:if="${erfolgsMeldung}" class="meldung erfolg" th:text="${erfolgsMeldung}"></div>
        <div th:if="${fehlermeldung}" class="meldung fehler" th:text="${fehlermeldung}"></div>

        <!-- Profil -->
        <section class="karte">
            <h2>Profil</h2>

            <!-- Profilbild -->
            <div style="display:flex; align-items:center; gap:1.5rem; margin-bottom:1.5rem;">
                <div class="profil-avatar">
                    <img th:if="${profil.profilbildUrl}" th:src="${profil.profilbildUrl}" alt="Profilbild"
                         style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
                    <div th:unless="${profil.profilbildUrl}" class="profil-avatar-placeholder"
                         th:text="${#strings.substring(#strings.toUpperCase(profil.anzeigename), 0, 2)}">FA</div>
                </div>
                <form th:action="@{/einstellungen/profilbild}" method="post" enctype="multipart/form-data"
                      style="display:flex; align-items:center; gap:0.75rem;">
                    <input type="file" name="datei" accept="image/jpeg,image/png,image/webp" required>
                    <button type="submit" class="btn btn-sm">Foto hochladen</button>
                </form>
            </div>

            <!-- Profil-Formular -->
            <form th:action="@{/einstellungen/profil}" th:object="${profilForm}" method="post">
                <div class="formular-grid">
                    <div class="formular-gruppe">
                        <label for="anzeigename">Anzeigename *</label>
                        <input type="text" id="anzeigename" th:field="*{anzeigename}" required>
                        <p class="fehler-text" th:if="${#fields.hasErrors('anzeigename')}" th:errors="*{anzeigename}"></p>
                    </div>
                    <div class="formular-gruppe">
                        <label for="positionTitel">Position / Titel</label>
                        <input type="text" id="positionTitel" th:field="*{positionTitel}"
                               placeholder="z.B. Geschäftsführer, Präsidentin">
                    </div>
                    <div class="formular-gruppe">
                        <label for="sprache">Bevorzugte Sprache</label>
                        <select id="sprache" th:field="*{sprache}">
                            <option th:each="entry : ${sprachen}" th:value="${entry.key}" th:text="${entry.value}"></option>
                        </select>
                    </div>
                    <div class="formular-gruppe">
                        <label for="telefon">Telefon</label>
                        <input type="tel" id="telefon" th:field="*{telefon}" placeholder="+41 79 123 45 67">
                    </div>
                    <div class="formular-gruppe">
                        <label for="ort">Ort</label>
                        <input type="text" id="ort" th:field="*{ort}" placeholder="z.B. Zürich">
                    </div>
                    <div class="formular-gruppe">
                        <label for="websiteUrl">Persönliche Website</label>
                        <input type="url" id="websiteUrl" th:field="*{websiteUrl}" placeholder="https://...">
                    </div>
                </div>
                <div class="formular-gruppe" style="margin-top:1rem;">
                    <label for="bio">Über mich</label>
                    <textarea id="bio" th:field="*{bio}" rows="4"
                              placeholder="Kurze Beschreibung über Sie und Ihre Rolle..."></textarea>
                </div>
                <div style="margin-top:1.5rem;">
                    <button type="submit" class="btn">Profil speichern</button>
                </div>
            </form>

            <p class="meta" style="margin-top:1rem; font-size:0.85rem; opacity:0.6;">
                E-Mail: <span th:text="${profil.email}">user@test.ch</span> ·
                Mitglied seit <span th:text="${profil.registriertAm != null ? #temporals.format(profil.registriertAm, 'dd.MM.yyyy') : '—'}">01.01.2026</span>
            </p>
        </section>

        <!-- Passwort -->
        <section class="karte">
            <h2>Passwort ändern</h2>
            <form th:action="@{/einstellungen/passwort}" method="post">
                <div class="formular-gruppe">
                    <label for="altesPasswort">Aktuelles Passwort</label>
                    <input type="password" id="altesPasswort" name="altesPasswort" required>
                </div>
                <div class="formular-gruppe">
                    <label for="neuesPasswort">Neues Passwort (mind. 8 Zeichen)</label>
                    <input type="password" id="neuesPasswort" name="neuesPasswort" required minlength="8">
                </div>
                <button type="submit" class="btn">Passwort ändern</button>
            </form>
        </section>

        <!-- Datenexport -->
        <section class="karte">
            <h2>Datenexport (DSG)</h2>
            <p>Laden Sie alle über Sie gespeicherten Daten als JSON herunter.</p>
            <a th:href="@{/einstellungen/datenexport}" class="btn">Daten exportieren</a>
        </section>
    </div>

    <style>
        .formular-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 640px) { .formular-grid { grid-template-columns: 1fr; } }
        .profil-avatar-placeholder {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--dash-primary, #2563eb); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 700;
        }
    </style>
</main>
</body>
</html>
