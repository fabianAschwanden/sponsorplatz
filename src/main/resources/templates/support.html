<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{support.title} + ' — Sponsorplatz'">Support — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="dashboard-body">
<div class="dashboard-layout">

    <aside th:replace="~{fragments/sidebar :: app-sidebar('support', null)}"></aside>

    <main class="dash-main" style="max-width:640px;">
        <header class="dash-topbar">
            <h1 style="font-size:1.3rem; margin:0;">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:0.4rem;">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                <span th:text="#{support.title}">Support</span>
            </h1>
        </header>

        <div th:if="${erfolgsMeldung}" class="alert success" th:text="${erfolgsMeldung}" style="margin-top:1rem;"></div>
        <div th:if="${fehlermeldung}" class="alert error" th:text="${fehlermeldung}"
             style="margin-top:1rem; padding:0.75rem 1rem; background:#fef2f2; border:1px solid #fecaca; border-radius:0.5rem; color:#991b1b;"></div>

        <div style="background:var(--dash-surface, #fff); border:1px solid var(--dash-border, #e5e7eb); border-radius:0.75rem; padding:1.5rem; margin-top:1rem;">
            <p style="color:#6b7280; font-size:0.9rem; margin-top:0; margin-bottom:1.25rem;"
               th:text="#{support.intro}">Haben Sie eine Frage oder ein Problem?</p>

            <form th:action="@{/support}" method="post" th:object="${supportForm}">

                <div style="margin-bottom:1rem;">
                    <label for="betreff" style="display:block; font-weight:600; font-size:0.9rem; margin-bottom:0.3rem;"
                           th:text="#{support.feld.betreff}">Betreff</label>
                    <input type="text" id="betreff" th:field="*{betreff}"
                           th:placeholder="#{support.feld.betreffPlaceholder}"
                           placeholder="z.B. Frage zur Verifizierung"
                           style="width:100%; padding:0.6rem 0.75rem; border:1px solid #d1d5db; border-radius:0.375rem; font-size:0.9rem;">
                    <span th:if="${#fields.hasErrors('betreff')}" th:errors="*{betreff}"
                          style="color:#ef4444; font-size:0.8rem; margin-top:0.2rem; display:block;"></span>
                </div>

                <div style="margin-bottom:1.25rem;">
                    <label for="nachricht" style="display:block; font-weight:600; font-size:0.9rem; margin-bottom:0.3rem;"
                           th:text="#{support.feld.nachricht}">Ihre Nachricht</label>
                    <textarea id="nachricht" th:field="*{nachricht}" rows="8"
                              th:placeholder="#{support.feld.nachrichtPlaceholder}"
                              placeholder="Beschreiben Sie Ihr Anliegen möglichst genau..."
                              style="width:100%; padding:0.6rem 0.75rem; border:1px solid #d1d5db; border-radius:0.375rem; font-size:0.9rem; resize:vertical;"></textarea>
                    <span th:if="${#fields.hasErrors('nachricht')}" th:errors="*{nachricht}"
                          style="color:#ef4444; font-size:0.8rem; margin-top:0.2rem; display:block;"></span>
                </div>

                <div style="display:flex; gap:0.75rem; align-items:center;">
                    <button type="submit" class="btn btn-primary" style="padding:0.6rem 1.5rem;"
                            th:text="#{support.btn.absenden}">Absenden</button>
                    <a th:href="@{/dashboard}" style="color:#6b7280; font-size:0.9rem; text-decoration:none;"
                       th:text="#{allgemein.abbrechen}">Abbrechen</a>
                </div>
            </form>
        </div>

        <div style="margin-top:1.5rem; padding:1rem; background:#f9fafb; border-radius:0.5rem; font-size:0.85rem; color:#6b7280;">
            <strong th:text="#{support.tipp.label}">Tipp:</strong>
            <span th:text="#{support.tipp.text}">Für dringende Anliegen erreichen Sie uns auch direkt per E-Mail an</span>
            <a href="mailto:support@sponsorplatz.ch" style="color:var(--dash-violet, #7c3aed);">support@sponsorplatz.ch</a>
        </div>
    </main>
</div>
</body>
</html>
