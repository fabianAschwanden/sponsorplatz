<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Organisationen — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('admin', null)}"></aside>

    <main class="app-main">
        <header class="app-page-head">
            <div>
                <p class="app-page-rubrik">Plattform-Admin</p>
                <h1>Alle Organisationen</h1>
            </div>
        </header>

        <!-- Admin-Navigation -->
        <nav style="display:flex; gap:0.75rem; margin-bottom:2rem; flex-wrap:wrap;">
            <a th:href="@{/admin}" class="app-btn app-btn-ghost">Übersicht</a>
            <a th:href="@{/admin/benutzer}" class="app-btn app-btn-ghost">Benutzer</a>
            <a th:href="@{/admin/organisationen}" class="app-btn">Organisationen</a>
            <a th:href="@{/admin/verifizierungen}" class="app-btn app-btn-ghost">Verifizierungen</a>
        </nav>

        <div th:if="${erfolgsMeldung}" class="app-meldung erfolg" th:text="${erfolgsMeldung}"></div>

        <p class="app-muted" th:text="${#lists.size(organisationen) + ' Organisationen'}"></p>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Typ</th>
                    <th>Branche</th>
                    <th>Status</th>
                    <th>Registriert</th>
                    <th>Aktionen</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="org : ${organisationen}">
                    <td>
                        <a th:href="@{'/organisationen/' + ${org.slug}}" th:text="${org.name}">Name</a>
                    </td>
                    <td><span class="app-chip" th:text="${org.typ}">VEREIN</span></td>
                    <td th:text="${org.branche != null ? org.branche.anzeige : '—'}">Sport</td>
                    <td>
                        <span class="app-status" th:classappend="${'status-' + #strings.toLowerCase(org.status)}"
                              th:text="${org.status}">PENDING</span>
                    </td>
                    <td th:text="${org.registriertAm != null ? #temporals.format(org.registriertAm, 'dd.MM.yyyy') : '—'}">01.01.2026</td>
                    <td style="white-space:nowrap;">
                        <form th:if="${org.status.name() == 'PENDING'}"
                              th:action="@{/admin/organisationen/{id}/verifizieren(id=${org.id})}" method="post"
                              style="display:inline; margin:0;">
                            <button type="submit" class="app-btn app-btn-sm">✓ Verifizieren</button>
                        </form>
                        <form th:if="${org.status.name() != 'SUSPENDED'}"
                              th:action="@{/admin/organisationen/{id}/suspendieren(id=${org.id})}" method="post"
                              style="display:inline; margin:0;"
                              onsubmit="return confirm('Organisation suspendieren?')">
                            <button type="submit" class="app-btn app-btn-danger app-btn-sm">Suspendieren</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<style>
    .admin-table-wrapper { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th, .admin-table td { padding: 0.75rem 0.5rem; text-align: left; border-bottom: 1px solid var(--dash-border, #e5e7eb); }
    .admin-table th { font-weight: 600; color: var(--dash-muted, #6b7280); font-size: 0.8rem; text-transform: uppercase; letter-spacing:0.02em; }
    .admin-table tr:hover td { background: var(--dash-surface-hover, #f9fafb); }
    .app-btn-sm { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
    .status-pending { color: #92400e; }
    .status-verified { color: #166534; }
    .status-active { color: #1d4ed8; }
    .status-suspended { color: #991b1b; }
</style>

</body>
</html>
