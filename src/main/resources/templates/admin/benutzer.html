<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.rubrik} + ' — ' + #{admin.benutzer.titel} + ' — Sponsorplatz'">Admin — Benutzer — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('admin', null)}"></aside>

    <main class="app-main">
        <header class="app-page-head">
            <div>
                <p class="app-page-rubrik" th:text="#{admin.rubrik}">Plattform-Admin</p>
                <h1 th:text="#{admin.benutzer.titel}">Benutzer-Verwaltung</h1>
            </div>
        </header>

        <!-- Admin-Navigation -->
        <nav style="display:flex; gap:0.75rem; margin-bottom:2rem; flex-wrap:wrap;">
            <a th:href="@{/admin}" class="app-btn app-btn-ghost" th:text="#{admin.nav.uebersicht}">Übersicht</a>
            <a th:href="@{/admin/benutzer}" class="app-btn" th:text="#{admin.nav.benutzer}">Benutzer</a>
            <a th:href="@{/admin/organisationen}" class="app-btn app-btn-ghost" th:text="#{admin.nav.organisationen}">Organisationen</a>
            <a th:href="@{/admin/verifizierungen}" class="app-btn app-btn-ghost" th:text="#{admin.nav.verifizierungen}">Verifizierungen</a>
        </nav>

        <div th:if="${erfolgsMeldung}" class="app-meldung erfolg" th:text="${erfolgsMeldung}"></div>

        <p class="app-muted" th:text="#{admin.benutzer.zaehlung(${#lists.size(benutzer)})}"></p>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                <tr>
                    <th th:text="#{admin.feld.anzeigename}">Anzeigename</th>
                    <th th:text="#{admin.feld.email}">E-Mail</th>
                    <th th:text="#{admin.feld.status}">Status</th>
                    <th th:text="#{admin.feld.auth}">Anmeldung</th>
                    <th th:text="#{admin.feld.rolle}">Rolle</th>
                    <th>2FA</th>
                    <th th:text="#{admin.feld.registriert}">Registriert</th>
                    <th th:text="#{admin.feld.aktionen}">Aktionen</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${benutzer}">
                    <td>
                        <div class="user-avatar-cell">
                            <span th:replace="~{fragments/avatar :: avatar(
                                    name=${u.anzeigename},
                                    bildUrl=${u.profilbildUrl},
                                    cssClass='user-avatar')}"></span>
                            <span th:text="${u.anzeigename}">Name</span>
                        </div>
                    </td>
                    <td th:text="${u.email}">email@test.ch</td>
                    <td>
                        <span th:if="${u.aktiv}" class="app-chip" style="background:#dcfce7;color:#166534;"
                              th:text="#{admin.benutzer.aktiv}">Aktiv</span>
                        <span th:unless="${u.aktiv}" class="app-chip" style="background:#fecaca;color:#991b1b;"
                              th:text="#{admin.benutzer.gesperrt}">Gesperrt</span>
                        <span th:unless="${u.emailVerifiziert}" class="app-chip" style="background:#fef3c7;color:#92400e;"
                              th:text="#{admin.benutzer.unverifiziert}">Unverifiziert</span>
                    </td>
                    <td>
                        <!-- Auth-Quellen (UC-SSO-4): Form-Login-Chip + Provider-Chips.
                             Hybrid-User (Form + Google) zeigen beide nebeneinander. -->
                        <div style="display:flex; flex-wrap:wrap; gap:0.25rem;">
                            <span th:if="${u.hatFormLogin}" class="app-chip"
                                  style="background:#e2e8f0;color:#334155;"
                                  th:text="#{admin.benutzer.auth.form}">Intern</span>
                            <span th:each="p : ${u.federierteProvider}" class="app-chip"
                                  th:classappend="${'auth-chip-' + #strings.toLowerCase(p)}"
                                  th:text="#{'admin.benutzer.auth.' + ${p}}">Provider</span>
                            <span th:if="${!u.hatFormLogin and #lists.isEmpty(u.federierteProvider)}"
                                  class="app-chip" style="background:#fef3c7;color:#92400e;"
                                  th:text="#{admin.benutzer.auth.keine}">—</span>
                        </div>
                    </td>
                    <td>
                        <form th:action="@{/admin/benutzer/{id}/rolle(id=${u.id})}" method="post"
                              style="display:inline; margin:0;">
                            <select name="rolle" onchange="this.form.submit()" style="font-size:0.85rem; padding:0.2rem;">
                                <option value="" th:selected="${u.platformRolle == null}"
                                        th:text="#{admin.benutzer.keineRolle}">— Keine —</option>
                                <option th:each="r : ${rollen}" th:value="${r}" th:text="${r}"
                                        th:selected="${u.platformRolle == r}">ROLLE</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <span th:if="${u.totpAktiv}" class="app-chip" style="background:#dcfce7;color:#166534;">aktiv</span>
                        <span th:unless="${u.totpAktiv}" class="app-chip" style="background:#f3f4f6;color:#6b7280;">—</span>
                    </td>
                    <td th:text="${u.registriertAm != null ? #temporals.format(u.registriertAm, 'dd.MM.yyyy') : '—'}">01.01.2026</td>
                    <td>
                        <form th:if="${u.aktiv}" th:action="@{/admin/benutzer/{id}/sperren(id=${u.id})}"
                              method="post" style="display:inline; margin:0;"
                              onsubmit="return confirm(this.querySelector('.confirm-msg').textContent);">
                            <span class="confirm-msg" hidden th:text="#{admin.benutzer.sperren.bestaetigung}"></span>
                            <button type="submit" class="app-btn app-btn-danger app-btn-sm"
                                    th:text="#{admin.benutzer.sperren}">Sperren</button>
                        </form>
                        <form th:unless="${u.aktiv}" th:action="@{/admin/benutzer/{id}/entsperren(id=${u.id})}"
                              method="post" style="display:inline; margin:0;">
                            <button type="submit" class="app-btn app-btn-sm" th:text="#{admin.benutzer.entsperren}">Entsperren</button>
                        </form>
                        <form th:if="${u.totpAktiv}" th:action="@{/admin/benutzer/{id}/2fa-reset(id=${u.id})}"
                              method="post" style="display:inline; margin-left:0.25rem;"
                              onsubmit="return confirm('2FA für ' + this.dataset.email + ' wirklich zurücksetzen? Der User kann sich danach nur mit Passwort anmelden und muss 2FA neu einrichten.');"
                              th:data-email="${u.email}">
                            <button type="submit" class="app-btn app-btn-sm" style="background:#fef3c7;color:#92400e;"
                                    title="Recovery: löscht TOTP-Secret + Backup-Codes für diesen User">
                                2FA-Reset
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<style>
    .admin-table-wrapper { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th, .admin-table td { padding: 0.75rem 0.5rem; text-align: left; border-bottom: 1px solid var(--dash-border, #e5e7eb); }
    .admin-table th { font-weight: 600; color: var(--dash-muted, #6b7280); font-size: 0.8rem; text-transform: uppercase; letter-spacing:0.02em; }
    .admin-table tr:hover td { background: var(--dash-surface-hover, #f9fafb); }
    .app-btn-sm { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
    /* Auth-Provider-Chips — Hintergrundfarbe pro IdP, Text mit ≥4.5:1 Kontrast */
    .auth-chip-google   { background: #DBEAFE; color: #1E3A8A; }   /* blau */
    .auth-chip-entra_id { background: #E0E7FF; color: #312E81; }   /* indigo */
    .auth-chip-swissid  { background: #FECACA; color: #991B1B; }   /* schweizer-rot */
    .auth-chip-edu_id   { background: #D1FAE5; color: #065F46; }   /* edu-grün */
</style>

<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
