<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Dashboard — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('admin', null)}"></aside>

    <main class="app-main">
        <header class="app-page-head">
            <div>
                <p class="app-page-rubrik">Plattform-Admin</p>
                <h1>Dashboard</h1>
            </div>
        </header>

        <!-- Admin-Navigation -->
        <nav style="display:flex; gap:0.75rem; margin-bottom:2rem; flex-wrap:wrap;">
            <a th:href="@{/admin}" class="app-btn">Übersicht</a>
            <a th:href="@{/admin/benutzer}" class="app-btn app-btn-ghost">Benutzer</a>
            <a th:href="@{/admin/organisationen}" class="app-btn app-btn-ghost">Organisationen</a>
            <a th:href="@{/admin/verifizierungen}" class="app-btn app-btn-ghost">Verifizierungen</a>
        </nav>

        <!-- Statistik-Karten -->
        <section class="admin-stats-grid">
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlBenutzer}">0</span>
                <span class="admin-stat-label">Benutzer gesamt</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlAktiveBenutzer}">0</span>
                <span class="admin-stat-label">Aktive Benutzer</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlOrganisationen}">0</span>
                <span class="admin-stat-label">Organisationen</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlPendingOrgs}">0</span>
                <span class="admin-stat-label">Pending Orgs</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlVerifizierteOrgs}">0</span>
                <span class="admin-stat-label">Verifizierte Orgs</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlProjekte}">0</span>
                <span class="admin-stat-label">Projekte</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlAnfragen}">0</span>
                <span class="admin-stat-label">Anfragen</span>
            </div>
            <div class="app-card admin-stat-card">
                <span class="admin-stat-value" th:text="${stats.anzahlNachrichten}">0</span>
                <span class="admin-stat-label">Nachrichten</span>
            </div>
        </section>
    </main>
</div>

<style>
    .admin-stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
    }
    .admin-stat-card {
        text-align: center;
        padding: 1.5rem 1rem;
    }
    .admin-stat-value {
        display: block;
        font-size: 2rem;
        font-weight: 700;
        font-family: var(--dash-font-head, sans-serif);
        color: var(--dash-primary, #2563eb);
    }
    .admin-stat-label {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: var(--dash-muted, #6b7280);
    }
</style>

</body>
</html>
