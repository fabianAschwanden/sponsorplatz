<!DOCTYPE html>
<html lang="de-CH" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{engagement.titel} + ' — ' + ${ansicht.sponsorName}">Engagements — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div th:if="${demoModus}" class="demo-disclaimer" th:text="#{demo.disclaimer}">
    ⚠️ DEMO — Beispieldaten.
</div>

<div class="app-layout">
    <aside th:replace="~{fragments/sidebar :: app-sidebar('marktplatz', ${anzahlOffeneAnfragen})}"></aside>

    <main class="app-main">

        <!-- Marken-Hero -->
        <header class="sf-hero">
            <div class="sf-hero-logo">
                <img th:if="${ansicht.sponsorLogoUrl != null}" th:src="@{${ansicht.sponsorLogoUrl}}" alt="">
                <span th:unless="${ansicht.sponsorLogoUrl != null}"
                      th:text="${#strings.substring(ansicht.sponsorName, 0, 1)}">C</span>
            </div>
            <div class="sf-hero-text">
                <p class="sf-hero-rubrik" th:text="#{engagement.titel}">Engagements</p>
                <h1 th:text="${ansicht.sponsorName}">CSS Versicherung</h1>
                <p class="sf-hero-sub" th:text="#{engagement.hero.subtitle(${ansicht.sponsorName})}">
                    Welche Sport- und Gesundheitsvereine CSS regional unterstützt.</p>
                <div class="sf-stats" th:unless="${ansicht.istLeer()}">
                    <span class="sf-stat"><strong th:text="${ansicht.anzahlVereine}">12</strong>
                        <span th:text="#{engagement.stat.vereine}">Vereine</span></span>
                    <span class="sf-stat"><strong th:text="${ansicht.anzahlRegionen}">5</strong>
                        <span th:text="#{engagement.stat.regionen}">Regionen</span></span>
                </div>
            </div>
        </header>

        <!-- Filter-Leiste: Region + Branche, kombinierbar -->
        <form class="sf-filter" method="get"
              th:action="@{/marken/{slug}/engagements(slug=${sponsorSlug})}"
              th:unless="${ansicht.istLeer() and ansicht.filterRegion == null and ansicht.filterBranche == null}">
            <label class="sf-filter-feld">
                <span th:text="#{engagement.filter.region}">Region</span>
                <select name="region" onchange="this.form.submit()">
                    <option value="" th:text="#{engagement.filter.alleRegionen}">Alle Regionen</option>
                    <option th:each="r : ${ansicht.verfuegbareRegionen}" th:value="${r}"
                            th:selected="${r == ansicht.filterRegion}" th:text="${r}">Zürich</option>
                </select>
            </label>
            <label class="sf-filter-feld">
                <span th:text="#{engagement.filter.branche}">Branche</span>
                <select name="branche" onchange="this.form.submit()">
                    <option value="" th:text="#{engagement.filter.alleBranchen}">Alle Branchen</option>
                    <option th:each="b : ${ansicht.verfuegbareBranchen}" th:value="${b}"
                            th:selected="${b == ansicht.filterBranche}" th:text="${b.getAnzeige()}">Sport</option>
                </select>
            </label>
            <noscript><button type="submit" class="app-btn app-btn-sm" th:text="#{engagement.filter.anwenden}">Anwenden</button></noscript>
            <a th:if="${ansicht.filterRegion != null or ansicht.filterBranche != null}"
               th:href="@{/marken/{slug}/engagements(slug=${sponsorSlug})}" class="sf-reset"
               th:text="#{engagement.filter.zuruecksetzen}">Filter zurücksetzen</a>
        </form>

        <!-- Leerer Zustand -->
        <div th:if="${ansicht.istLeer()}" class="app-empty">
            <strong th:text="#{engagement.empty}">Noch keine öffentlichen Engagements vorhanden.</strong>
            <span th:if="${ansicht.filterRegion != null or ansicht.filterBranche != null}">
                <a th:href="@{/marken/{slug}/engagements(slug=${sponsorSlug})}"
                   th:text="#{engagement.filter.zuruecksetzen}">Filter zurücksetzen</a>
            </span>
        </div>

        <!-- Engagements nach Region gruppiert -->
        <th:block th:each="gruppe : ${ansicht.nachRegion}">
            <div class="sf-region-kopf">
                <h2>
                    <span aria-hidden="true">📍</span>
                    <span th:text="${gruppe.key != '' ? gruppe.key : #messages.msg('engagement.regionUnbekannt')}">Zürich</span>
                </h2>
                <span class="sf-region-anzahl" th:text="${gruppe.value.size()}">3</span>
            </div>
            <div class="sf-grid">
                <article class="sf-karte" th:each="e : ${gruppe.value}"
                         th:classappend="'branche-' + ${e.vereinBranche()}">
                    <div class="sf-karte-akzent"></div>
                    <div class="sf-karte-kopf">
                        <span class="sf-avatar" th:text="${#strings.substring(e.vereinName(), 0, 1)}">F</span>
                        <div class="sf-karte-titel">
                            <a class="sf-verein" th:href="@{/vereine/{slug}(slug=${e.vereinSlug()})}"
                               th:text="${e.vereinName()}">FC Beispiel</a>
                            <span class="sf-chip" th:if="${e.vereinBranche() != null}"
                                  th:text="${e.vereinBranche().getAnzeige()}">Sport</span>
                        </div>
                    </div>
                    <a class="sf-projekt" th:href="@{/marktplatz/{slug}(slug=${e.projektSlug()})}">
                        <span class="sf-projekt-label" th:text="#{engagement.projektLabel}">Projekt:</span>
                        <span th:text="${e.projektName()}">Sommerfest</span>
                    </a>
                    <div class="sf-karte-fuss">
                        <span class="sf-paket" th:text="${e.paketName()}">Gold</span>
                    </div>
                </article>
            </div>
        </th:block>
    </main>
</div>

<style>
    /* ============ Engagement-Schaufenster ============ */
    .sf-hero {
        display:flex; align-items:center; gap:1.5rem;
        background:linear-gradient(120deg, var(--dash-violet-dark) 0%, var(--dash-violet) 100%);
        color:#fff; border-radius:var(--dash-radius); padding:1.75rem 2rem; margin-bottom:1.5rem;
    }
    .sf-hero-logo {
        flex:0 0 auto; width:84px; height:84px; border-radius:18px; background:#fff;
        display:flex; align-items:center; justify-content:center; overflow:hidden;
        box-shadow:0 6px 18px rgba(0,0,0,0.18);
    }
    .sf-hero-logo img { width:100%; height:100%; object-fit:contain; padding:8px; }
    .sf-hero-logo span { font-size:2.4rem; font-weight:800; color:var(--dash-violet-dark); }
    .sf-hero-rubrik { margin:0; font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; opacity:0.85; }
    .sf-hero-text h1 { margin:0.15rem 0 0.35rem; font-size:1.7rem; }
    .sf-hero-sub { margin:0; opacity:0.92; max-width:48ch; }
    .sf-stats { display:flex; gap:2rem; margin-top:1rem; }
    .sf-stat { display:flex; flex-direction:column; line-height:1.1; }
    .sf-stat strong { font-size:1.5rem; }
    .sf-stat span { font-size:0.8rem; opacity:0.85; }

    /* Filter */
    .sf-filter {
        display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-end;
        background:var(--dash-card); border:1px solid var(--dash-border);
        border-radius:var(--dash-radius); padding:1rem 1.25rem; margin-bottom:1.75rem;
    }
    .sf-filter-feld { display:flex; flex-direction:column; gap:0.3rem; font-size:0.8rem; color:var(--dash-muted); font-weight:600; }
    .sf-filter-feld select {
        padding:0.5rem 0.8rem; border:1px solid var(--dash-border); border-radius:var(--dash-radius-pill);
        background:#fff; font-size:0.9rem; color:var(--dash-text); min-width:200px;
    }
    .sf-filter-feld select:focus { outline:2px solid var(--dash-violet); outline-offset:1px; }
    .sf-reset { font-size:0.85rem; color:var(--dash-violet-dark); align-self:center; }

    /* Region-Kopf */
    .sf-region-kopf { display:flex; align-items:center; gap:0.6rem; margin:1.75rem 0 0.9rem; }
    .sf-region-kopf h2 { margin:0; font-size:1.15rem; display:flex; align-items:center; gap:0.4rem; }
    .sf-region-anzahl {
        font-size:0.72rem; font-weight:700; color:var(--dash-muted);
        background:var(--dash-bg); border:1px solid var(--dash-border);
        border-radius:999px; padding:0.1rem 0.6rem;
    }

    /* Karten-Raster */
    .sf-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:1.1rem; }
    .sf-karte {
        position:relative; background:var(--dash-card); border:1px solid var(--dash-border);
        border-radius:var(--dash-radius); padding:1.2rem 1.25rem 1rem; overflow:hidden;
        transition:transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        --bc:#6366f1;
    }
    .sf-karte:hover { transform:translateY(-3px); box-shadow:0 10px 26px rgba(15,23,42,0.10); border-color:var(--bc); }
    .sf-karte-akzent { position:absolute; top:0; left:0; right:0; height:4px; background:var(--bc); }
    .sf-karte-kopf { display:flex; align-items:center; gap:0.75rem; margin-top:0.25rem; }
    .sf-avatar {
        flex:0 0 auto; width:44px; height:44px; border-radius:12px; background:var(--bc);
        color:#fff; font-weight:800; font-size:1.2rem; display:flex; align-items:center; justify-content:center;
    }
    .sf-karte-titel { display:flex; flex-direction:column; gap:0.3rem; min-width:0; }
    .sf-verein { font-weight:700; color:var(--dash-text); text-decoration:none; font-size:1.02rem; }
    .sf-verein:hover { color:var(--bc); }
    .sf-chip {
        align-self:flex-start; font-size:0.72rem; font-weight:600; padding:0.12rem 0.55rem;
        border-radius:999px; color:var(--bc);
        background:color-mix(in srgb, var(--bc) 13%, #fff);
    }
    .sf-projekt { display:block; margin:0.9rem 0 0; color:var(--dash-text); text-decoration:none; font-size:0.92rem; }
    .sf-projekt:hover { color:var(--bc); }
    .sf-projekt-label { color:var(--dash-muted); }
    .sf-karte-fuss { margin-top:0.8rem; }
    .sf-paket {
        font-size:0.72rem; font-weight:600; color:var(--dash-muted);
        background:var(--dash-bg); border:1px solid var(--dash-border);
        border-radius:6px; padding:0.15rem 0.55rem;
    }

    /* Branche-Farben (CSS-Variable je Karte) */
    .branche-SPORT { --bc:#2563eb; }
    .branche-BEWEGUNG { --bc:#0891b2; }
    .branche-REHA { --bc:#0d9488; }
    .branche-BEHINDERTENSPORT { --bc:#7c3aed; }
    .branche-SENIORENSPORT { --bc:#c026d3; }
    .branche-PRAEVENTION { --bc:#16a34a; }
    .branche-MENTAL_HEALTH { --bc:#db2777; }
    .branche-ERNAEHRUNG { --bc:#ea580c; }
    .branche-WELLNESS { --bc:#ca8a04; }
    .branche-SELBSTHILFE { --bc:#4f46e5; }
    .branche-PATIENTENORGANISATION { --bc:#dc2626; }

    @media (max-width:640px) {
        .sf-hero { flex-direction:column; text-align:center; }
        .sf-stats { justify-content:center; }
    }
</style>

<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
