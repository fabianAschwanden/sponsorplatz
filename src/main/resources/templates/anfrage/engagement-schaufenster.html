<!DOCTYPE html>
<html lang="de-CH"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{engagement.titel} + ' — Sponsorplatz'">Engagements — Sponsorplatz</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
</head>
<body class="app-body">

<div th:if="${demoModus}" class="demo-disclaimer" th:text="#{demo.disclaimer}">
    ⚠️ DEMO — Beispieldaten.
</div>

<div class="app-layout">

    <aside th:replace="~{fragments/sidebar :: app-sidebar('marken', ${anzahlOffeneAnfragen})}"></aside>

    <main class="app-main">
    <div class="seitenkopf">
        <h1 th:text="#{engagement.titel}">Unsere Engagements</h1>
    </div>

    <p th:if="${#lists.isEmpty(engagements)}" class="muted" th:text="#{engagement.empty}">
        Noch keine öffentlichen Engagements vorhanden.
    </p>

    <div class="engagement-grid" th:unless="${#lists.isEmpty(engagements)}">
        <div class="engagement-karte" th:each="e : ${engagements}">
            <div class="engagement-header">
                <a th:href="@{/vereine/{slug}(slug=${e.vereinSlug()})}" class="engagement-verein"
                   th:text="${e.vereinName()}">Verein</a>
                <span class="branche-chip branche-chip-aktiv" th:text="${e.vereinBranche()}">Branche</span>
            </div>
            <p class="engagement-projekt">
                <span th:text="#{engagement.projektLabel}">Projekt:</span>
                <a th:href="@{/marktplatz/{slug}(slug=${e.projektSlug()})}"
                   th:text="${e.projektName()}">Projekt</a>
            </p>
            <p class="muted" th:if="${e.region() != null}">
                📍 <span th:text="${e.region()}">Region</span>
            </p>
            <p class="muted">
                <span th:text="#{engagement.paketLabel}">Paket:</span>
                <span th:text="${e.paketName()}">Paket</span>
            </p>
        </div>
    </div>
    </main>
</div>

<th:block th:replace="~{fragments/sentry-browser :: sentry-script}"></th:block>
</body>
</html>
