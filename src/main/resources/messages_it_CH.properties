# Condizioni generali (Fase 10.3)
agb.titel=Condizioni generali (CGC)
agb.geltungsbereich.titel=1. Campo di applicazione
agb.geltungsbereich.text=Le presenti condizioni generali disciplinano l'utilizzo della piattaforma \u00abSponsorplatz\u00bb (di seguito \u00abPiattaforma\u00bb), gestita da Fabian Aschwanden (di seguito \u00abGestore\u00bb). Con la registrazione, gli utenti accettano le presenti CGC.
agb.leistungen.titel=2. Prestazioni della piattaforma
agb.leistungen.text=La piattaforma mette in contatto associazioni e organizzazioni dello sport e della salute con potenziali sponsor. Sponsorplatz fornisce l'infrastruttura tecnica - il gestore non diventa parte degli accordi di sponsorizzazione tra associazioni e sponsor.
agb.registrierung.titel=3. Registrazione e account
agb.registrierung.punkt1=Per l'utilizzo \u00e8 necessario un account utente con indirizzo e-mail valido.
agb.registrierung.punkt2=I dati forniti durante la registrazione devono essere veritieri.
agb.registrierung.punkt3=Ogni persona fisica pu\u00f2 avere un solo account.
agb.registrierung.punkt4=La password deve essere mantenuta riservata. Il gestore non \u00e8 responsabile per danni causati da utilizzo improprio da parte di terzi.
agb.vereine.titel=4. Associazioni e organizzazioni
agb.vereine.punkt1=Le associazioni devono avere un legame dimostrabile con lo sport o la salute (secondo la scelta della branca durante la registrazione).
agb.vereine.punkt2=Il gestore si riserva il diritto di verificare le associazioni e di sospenderle in caso di violazioni.
agb.vereine.punkt3=I contenuti pubblicati (progetti, testi, immagini) devono rispettare le leggi vigenti e non devono violare i diritti di terzi.
agb.sponsoren.titel=5. Sponsor
agb.sponsoren.punkt1=Gli sponsor si registrano come aziende e possono trovare progetti e inviare richieste tramite il marketplace.
agb.sponsoren.punkt2=Gli accordi di sponsorizzazione vengono conclusi direttamente tra sponsor e associazione. Il gestore non \u00e8 responsabile per l'adempimento di tali accordi.
agb.gebuehren.titel=6. Tariffe
agb.gebuehren.text=L'utilizzo della piattaforma \u00e8 gratuito durante la fase pilota. In caso di introduzione di un modello a pagamento, gli utenti esistenti saranno informati con almeno 30 giorni di anticipo.
agb.haftung.titel=7. Responsabilit\u00e0
agb.haftung.punkt1=Il gestore non \u00e8 responsabile per l'esattezza dei contenuti pubblicati dagli utenti.
agb.haftung.punkt2=La disponibilit\u00e0 della piattaforma \u00e8 garantita al meglio, ma non pu\u00f2 essere assicurato un funzionamento ininterrotto.
agb.haftung.punkt3=Le richieste di risarcimento sono, nei limiti consentiti dalla legge, limitate al dolo e alla colpa grave.
agb.datenschutz.titel=8. Protezione dei dati
agb.datenschutz.text=Per il trattamento dei dati personali si applica la nostra informativa sulla privacy.
agb.datenschutz.link=- Informativa sulla privacy
agb.inhalte.titel=9. Contenuti e propriet\u00e0 intellettuale
agb.inhalte.punkt1=Gli utenti mantengono tutti i diritti sui contenuti da loro pubblicati.
agb.inhalte.punkt2=Con il caricamento, gli utenti concedono al gestore un diritto d'uso semplice e non trasferibile per la visualizzazione sulla piattaforma.
agb.inhalte.punkt3=Il gestore pu\u00f2 rimuovere senza preavviso contenuti manifestamente illeciti.
agb.kuendigung.titel=10. Disdetta e cancellazione dell'account
agb.kuendigung.punkt1=Gli utenti possono richiedere la cancellazione del proprio account in qualsiasi momento tramite e-mail al gestore.
agb.kuendigung.punkt2=Il gestore pu\u00f2 sospendere o cancellare account in caso di violazione delle presenti CGC.
agb.kuendigung.punkt3=Gli accordi di sponsorizzazione in corso non sono interessati dalla cancellazione dell'account.
agb.aenderungen.titel=11. Modifiche delle CGC
agb.aenderungen.text=Il gestore pu\u00f2 modificare le presenti CGC in qualsiasi momento. Le modifiche sostanziali saranno comunicate tramite e-mail o notifica in-app. La versione attuale su questa pagina \u00e8 determinante.
agb.recht.titel=12. Diritto applicabile e foro competente
agb.recht.text=Si applica esclusivamente il diritto svizzero. Il foro competente \u00e8 il domicilio del gestore, salvo che la legge preveda un altro foro imperativo.

