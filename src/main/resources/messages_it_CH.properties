index.title=Sponsorplatz — Dove le associazioni e CSS si incontrano
index.metaDescription=Sponsorplatz è la piattaforma curata che riunisce le associazioni svizzere dello sport e della salute e il team sponsoring di CSS. Movimento, riabilitazione, salute mentale, alimentazione — tutto ciò che mantiene la Svizzera in salute.
