# =============================================================================
# Profil: prod — Produktion mit PostgreSQL
# Aktivieren via:  --spring.profiles.active=prod
# Sensible Werte über Umgebungsvariablen / Vault — niemals committen!
# =============================================================================

# Datenbank
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — strikte Schema-Validierung gegen Flyway-Migrationen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — aktiviert, läuft beim Startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# H2-Konsole — IMMER aus
spring.h2.console.enabled=false

# Aktuator — nur health & info nach außen, keine Details
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Mail — über ENV
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging — strukturiertes JSON
logging.level.root=INFO
logging.level.ch.sponsorplatz=INFO
logging.config=classpath:logback-spring-prod.xml

# Sicherheit
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
