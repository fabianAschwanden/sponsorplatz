# =============================================================================
# Profil: prod ? Produktion mit PostgreSQL
# Aktivieren via:  --spring.profiles.active=prod
# Sensible Werte über Umgebungsvariablen / Vault ? niemals committen!
# =============================================================================

# Datenbank
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? strikte Schema-Validierung gegen Flyway-Migrationen
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway ? aktiviert, läuft beim Startup
spring.flyway.enabled=true
# Postgres-spezifische Migrations (z.B. tsvector) liegen in db/migration_postgres
# (NICHT als Subordner von db/migration ? Flyway scannt rekursiv). Werden nur
# in prod/cloud-free geladen, dev (H2) sieht diese nicht.
spring.flyway.locations=classpath:db/migration,classpath:db/migration_postgres
# Out-of-order-Apply: bei parallelen Branches kann eine niedrigere Version nach
# einer höheren reinkommen (z.B. V19 nach V20 dank V18-Kollision). Ohne diese
# Option verweigert Flyway den Start mit "Detected resolved migration not applied".
spring.flyway.out-of-order=true

# H2-Konsole ? IMMER aus
spring.h2.console.enabled=false

# Aktuator ? health, info, prometheus auf separatem Management-Port.
# In prod laufen Actuator-Endpoints auf einem eigenen, per Default
# nur per Loopback erreichbaren Port ? damit Prometheus-Metriken
# (JVM-Memory, DB-Pool-Stats, Endpoint-Latenzen) nicht öffentlich
# scrapebar sind. Operations setzt:
#   MANAGEMENT_SERVER_PORT=9090            # Default: 9090
#   MANAGEMENT_SERVER_ADDRESS=127.0.0.1    # Default: loopback only
# Prometheus-Scraper muss daher entweder im selben Host laufen oder
# per SSH-Tunnel / Sidecar zugreifen. Healthcheck-Probes (K8s/Compose)
# müssen ihre URL auf den Management-Port umstellen.
management.server.port=${MANAGEMENT_SERVER_PORT:9090}
management.server.address=${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
# Mail-Health nicht für App-Health relevant (Mails laufen async via Listener,
# Mail-Server-Ausfall darf die App nicht als DOWN markieren)
management.health.mail.enabled=false

# Mail ? über ENV
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
# Auth + TLS optional ? wird erst aktiv wenn Username/Password gesetzt
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

# Logging ? Spring-Boot-Default reicht für jetzt; strukturierte JSON-Logs (logstash-encoder ist im pom)
# können später via logback-spring.xml ergänzt werden.
logging.level.root=INFO
logging.level.ch.sponsorplatz=INFO

# Sicherheit
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Sentry Error-Tracking ? in prod aktiv wenn SENTRY_DSN gesetzt.
# Environment wird explizit auf "production" gesetzt, Release MUSS via CI gesetzt
# werden (Git-Tag + Build-Version), kein Dev-Fallback ? sonst landen Prod-Events
# unter dem SNAPSHOT-Release-Tag und Release-Health-Tracking ist unbrauchbar.
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.release=${SENTRY_RELEASE}
sentry.send-default-pii=false
sentry.traces-sample-rate=0

# =============================================================================
# OIDC SSO ? Microsoft Entra ID (Spec AUTH_SSO_OIDC.md)
# =============================================================================
# Default leer ? keine Client-Registration ? kein "Mit CSS-Konto"-Button.
# Aktivierung: Operations setzt direkt Spring-konforme ENVs (Konvention
# UNDERSCORE ? DOT, mappt automatisch via Spring Boot Relaxed-Binding):
#
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_CLIENT_ID=...
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_CLIENT_SECRET=...
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_CLIENT_NAME=CSS-Konto
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_SCOPE=openid,profile,email
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_AUTHORIZATION_GRANT_TYPE=authorization_code
#   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ENTRA_REDIRECT_URI={baseUrl}/login/oauth2/code/{registrationId}
#   SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_ENTRA_ISSUER_URI=https://login.microsoftonline.com/<TENANT_ID>/v2.0
#
# Spring registriert den Client erst, wenn client-id, client-secret und issuer-uri
# alle nicht-leer sind ? leere Defaults zwingen Spring-Setup nicht in invaliden
# Zustand. KEINE Default-Properties hier, damit ein leeres Setup nicht eine
# kaputte Client-Registration mit empty client-id baut (502 beim Boot, gesehen
# in CD-Run 25626185902).
#
# Optional Group?PlatformRolle (analog mit SPRING_-Konvention):
#   SPONSORPLATZ_OIDC_ROLLEN_MAPPING_PLATFORM_ADMIN=sponsorplatz-admins

# REST-API Key (ENV: SPONSORPLATZ_API_KEY).
# Leer ODER ungesetzt = API ausgeschaltet (ApiKeyFilter antwortet mit 503).
# Off-by-default ist Absicht: ohne explizit gesetzten Key kein Eingangspfad.
# Brute-Force ist zusätzlich durch RateLimitFilter (IP-basiert) abgedeckt —
# Filter-Reihenfolge LoginSperre → RateLimit → ApiKey ist in SecurityConfig
# linear verdrahtet.
sponsorplatz.api.key=${SPONSORPLATZ_API_KEY:}
