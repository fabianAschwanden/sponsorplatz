# =============================================================================
# Profil: dev ? Lokale Entwicklung mit H2 (file-based)
# Aktivieren via:  mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =============================================================================

# H2 file-Datenbank (persistent zwischen Restarts)
spring.datasource.url=jdbc:h2:file:./data/sponsorplatz;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2-Konsole (nur dev!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA ? Schema-Verwaltung kommt aus Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway ? aktiv (gleiche Migrationen wie prod)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Mail (lokales Mailhog auf Port 1025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Health-Check: Mail-Indicator deaktivieren (MailHog nicht immer aktiv)
management.health.mail.enabled=false

# REST-API Key für IDE-/CLI-Zugriff auf /api/** (Phase 10)
sponsorplatz.api.key=dev-api-key-2026
