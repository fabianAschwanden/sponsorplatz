# =============================================================================
# Profil: dev — Lokale Entwicklung mit H2 (file-based)
# Aktivieren via:  mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =============================================================================

# H2 file-Datenbank (persistent zwischen Restarts)
spring.datasource.url=jdbc:h2:file:./data/sponsorplatz;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2-Konsole (nur dev!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA — Schema-Verwaltung
# Phase 0: hibernate.ddl-auto=update — schnelles Iterieren
# Phase 1+: validate, Schema kommt nur noch aus Flyway
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway — in dev deaktiviert (Hibernate macht's), wird in Phase 1 aktiviert
spring.flyway.enabled=false

# Mail (lokales Mailhog auf Port 1025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
