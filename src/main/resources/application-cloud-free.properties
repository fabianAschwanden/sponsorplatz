# =============================================================================
# Profil: cloud-free — OCI Always-Free-VM Deployment
# =============================================================================
# Aktivieren via:  SPRING_PROFILES_ACTIVE=cloud-free
#
# Erbt von prod (gleicher Stack: PostgreSQL, BCrypt, Flyway, Form-Login).
# Unterschied: Defaults für die Always-Free-VM (E2.1.Micro, 1 GB RAM):
#   - Tomcat-Threadpool kleiner (RAM-begrenzt)
#   - HikariCP klein (Postgres-Connections-Limit beachten)
#   - Mail über STMP Relay (z.B. Mailgun, AWS SES)
#   - SSL über Caddy als Reverse-Proxy → App lauscht weiter auf 8080 (HTTP)
#
# Sensible Werte (DB_PASSWORD, SMTP_PASSWORD, SPONSORPLATZ_ADMIN_PASSWORD)
# kommen aus ENV-Vars im docker-compose auf der VM (nicht im Image).
# =============================================================================

spring.profiles.include=prod

# --- Tomcat-Tuning für 1-vCPU-VM ---------------------------------------------
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20
server.tomcat.connection-timeout=10s

# Forwarded-Header (Caddy reicht X-Forwarded-Proto/-For weiter)
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# --- HikariCP — Postgres läuft auf gleicher VM, max ~20 Connections ----------
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000

# --- JVM-Heap-Hinweis: in docker-compose JAVA_OPTS=-Xmx512m setzen ----------

# --- Mail — externer SMTP-Relay (z.B. Mailgun, Mailtrap, AWS SES) ----------
# SMTP_HOST/PORT/USER/PASSWORD über ENV
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# --- Externe Basis-URL für Mail-Links + OAuth-Redirects ----------------------
# z.B. https://sponsorplatz.example.ch — wird vom EinladungsMailListener und
# VerifikationsService benutzt für die Token-Links.
sponsorplatz.basis-url=${BASIS_URL:http://localhost}

# --- Storage: lokales Verzeichnis innerhalb des Containers; in docker-compose
#     muss /app/uploads als Volume gemountet werden. ---------------------------
sponsorplatz.storage.lokal.basis-pfad=${STORAGE_PFAD:/app/uploads}

# --- Logging: stdout, Spring-Boot-Default. Strukturierte JSON-Logs später. --
logging.level.root=INFO
logging.level.ch.sponsorplatz=INFO
# Connection-Pool-Warnungen bei Lastspitzen sichtbar
logging.level.com.zaxxer.hikari=INFO

# --- Sicherheit: keine Stack-Traces nach außen ------------------------------
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# --- Aktuator: nur health/info, keine Details für anonyme Aufrufer ----------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# --- Info-Endpoint mit Build-Daten (sichtbar in /actuator/info) -------------
management.info.env.enabled=true
management.info.git.enabled=true
management.info.build.enabled=true
