# E2E-Test-Profil — wird zusaetzlich zu 'dev' aktiviert in E2ESpringConfig.
#
# Mail komplett deaktiviert: Verifizierungs-Mail wird im Test durch
# fixtures.markiereEmailVerifiziert() ersetzt. Damit weicht das Profil
# bewusst vom Prod-Pfad ab, vermeidet aber MailHog-Abhaengigkeit + die
# E-Mail-Capture-Choreografie im Pilot.
spring.mail.host=
spring.mail.port=0
sponsorplatz.mail.enabled=false

# Storage lokal in temp/, keine OCI-Calls
sponsorplatz.storage.provider=lokal
sponsorplatz.storage.lokal.basis-pfad=${java.io.tmpdir}/sponsorplatz-e2e

# Reduzierte Loglevel im Test
logging.level.org.hibernate.SQL=WARN
logging.level.ch.sponsorplatz=INFO
