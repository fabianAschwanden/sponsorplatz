# =============================================================================
# Sponsorplatz — Lokales Dev-Stack
# Verwendung:  docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: sponsorplatz-db
    environment:
      POSTGRES_DB: sponsorplatz
      POSTGRES_USER: sponsor
      POSTGRES_PASSWORD: sponsor_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponsor -d sponsorplatz"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sponsorplatz-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web-UI

  app:
    profiles: ["app"]    # nur mit `--profile app` starten
    build: .
    container_name: sponsorplatz-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/sponsorplatz
      DB_USER: sponsor
      DB_PASSWORD: sponsor_dev
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "8080:8080"
    volumes:
      - sponsorplatz_uploads:/app/uploads

volumes:
  postgres_data:
  sponsorplatz_uploads:
