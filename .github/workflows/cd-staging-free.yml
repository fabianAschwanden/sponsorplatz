name: CD Staging (Free Tier)

# Deploy auf die OCI Always-Free-VM (infra/staging-free).
# Triggered nach jedem grünen CI-Run auf main.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  # packages: write erlaubt push nach ghcr.io via GITHUB_TOKEN — kein PAT nötig.
  packages: write

jobs:
  # Diagnose-Job: läuft immer und logt explizit, warum der Deploy skipped wurde.
  preflight:
    name: Preflight (vars check)
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - id: check
        run: |
          # 'if'-Pattern statt '[ test ] && cmd' — letzteres bricht unter
          # 'set -e' (GH-Actions-Default) ab, wenn der Test false ist.
          missing=()
          if [ -z "${{ vars.STAGING_FREE_VM_IP }}" ]; then
            missing+=("vars.STAGING_FREE_VM_IP")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::CD skipped — fehlende Repo-Variablen: ${missing[*]}. Setup siehe infra/staging-free/README.md"
            echo "can-deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can-deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Build → Trivy → Push → SSH-Deploy
    needs: preflight
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.preflight.outputs.can-deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: staging-free
      url: https://${{ vars.STAGING_FREE_DOMAIN || vars.STAGING_FREE_VM_IP }}
    env:
      # GHCR statt OCIR (2026-05-22): OCI Always-Free unterstützt OCIR-Push nicht
      # mehr — 'unknown: Free tier account is not supported'. GHCR ist gratis,
      # via GITHUB_TOKEN authentifiziert (kein PAT, kein Secret-Setup), Pull
      # auf der VM funktioniert ohne Login wenn das Package public ist.
      IMAGE_BASE: ghcr.io/fabianaschwanden/sponsorplatz
      IMAGE_TAG:  ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64 für Free-Tier-VM)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_BASE }}:staging-latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_BASE }}:staging-latest

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_FREE_SSH_PRIVATE_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.STAGING_FREE_VM_IP }} >> ~/.ssh/known_hosts

      # GitHub-managed Secrets, die in die VM-.env wandern. Aktuell genau ein
      # Eintrag: SPONSORPLATZ_API_KEY (off-by-default — wenn nicht gesetzt,
      # antwortet ApiKeyFilter mit 503, und dieser Step wird übersprungen).
      # Workflow für Key-Rotation:
      #   Settings → Secrets → SPONSORPLATZ_API_KEY aktualisieren →
      #   manuell `workflow_dispatch` oder beim nächsten Push auf main.
      # Andere Secrets (DB_PASSWORD, SMTP_*, ADMIN_*) bleiben bewusst in der
      # manuell gepflegten /opt/sponsorplatz/.env — die werden einmal beim
      # VM-Provisioning gesetzt und sind nicht rotations-getrieben.
      - name: Sync managed Secrets in VM-.env (idempotent)
        if: success()
        env:
          API_KEY: ${{ secrets.SPONSORPLATZ_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::notice::SPONSORPLATZ_API_KEY-Secret nicht gesetzt — überspringe .env-Update. API bleibt deaktiviert (503)."
            exit 0
          fi
          # SPONSORPLATZ_API_KEY zeilenweise austauschen oder anhängen.
          # Atomar via /tmp-Stage + install, dann Container force-recreaten
          # damit Spring die neue ENV beim Boot liest.
          ssh opc@${{ vars.STAGING_FREE_VM_IP }} "
            set -e
            sudo touch /opt/sponsorplatz/.env
            sudo grep -v '^SPONSORPLATZ_API_KEY=' /opt/sponsorplatz/.env > /tmp/env.new || true
            echo 'SPONSORPLATZ_API_KEY=$API_KEY' >> /tmp/env.new
            sudo install -m 0600 -o root -g root /tmp/env.new /opt/sponsorplatz/.env
            rm -f /tmp/env.new
            echo 'SPONSORPLATZ_API_KEY synced in /opt/sponsorplatz/.env'
          "

      - name: Deploy on VM (cleanup + pull + restart)
        run: |
          # Pre-Pull-Cleanup: alte ungenutzte Images älter als 24h löschen.
          # Free-Tier-VM hat nur 30 GB Boot-Volume.
          # --force-recreate: ENV-Änderungen aus dem .env-Sync-Step werden
          # nur beim Container-Re-Create wirksam — auch wenn der Image-Tag
          # gleich bleibt (z.B. CD-Re-Run für denselben Commit).
          ssh opc@${{ vars.STAGING_FREE_VM_IP }} \
            "sudo docker system prune -af --filter 'until=24h' 2>&1 | tail -3 && \
             cd /opt/sponsorplatz && sudo docker compose pull app && sudo docker compose up -d --force-recreate app"

      - name: Smoke test
        run: |
          # Hinweis: Actuator läuft in prod (siehe application-prod.properties)
          # auf Port 9090 mit Loopback-Bind und ist von ausserhalb der VM
          # bewusst NICHT erreichbar. Stattdessen probieren wir die /login-
          # Public-Route — die liefert nur 200, wenn Tomcat + Thymeleaf +
          # SecurityConfig + DB-Verbindung alle hochgekommen sind.
          # Der echte Actuator-Healthcheck läuft Container-intern via
          # docker-compose-healthcheck (siehe staging-free/docker-compose.yml).
          SMOKE_URL="${{ vars.STAGING_FREE_DOMAIN && format('https://{0}', vars.STAGING_FREE_DOMAIN) || format('http://{0}', vars.STAGING_FREE_VM_IP) }}/login"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "$SMOKE_URL"; then
              echo "Smoke OK after $i polls ($SMOKE_URL)"; exit 0
            fi
            echo "Poll $i — not ready yet ($SMOKE_URL)"
            sleep 10
          done
          echo "Smoke check failed at $SMOKE_URL"
          exit 1

      # GHCR-Retention läuft über GitHubs eigene Package-Retention-Policy
      # (Settings → Packages → sponsorplatz → Manage versions). Standard:
      # alle Versionen bleiben — bei Bedarf manuell prunen via `gh api`.
      # Kein automatischer Cleanup-Step nötig, weil das VM-Disk-Limit nicht
      # mehr betroffen ist (Pull ist on-demand).
