name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B -q clean verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  docker-build:
    name: Docker Build (Smoke)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sponsorplatz:ci-${{ github.sha }}

      - name: Smoke-Test Image
        run: |
          docker run --rm -d --name smoke -p 8080:8080 sponsorplatz:ci-${{ github.sha }}
          for i in {1..30}; do
            if curl -fs http://localhost:8080/actuator/health > /dev/null; then
              echo "Healthcheck OK"; docker stop smoke; exit 0
            fi
            sleep 2
          done
          echo "Healthcheck FAILED"; docker logs smoke; docker stop smoke; exit 1
