name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Diagnose vor mvn-Run — hilft bei zukünftigen 'BlobNotFound'-Log-
      # Aussetzern (2026-05-23: drei Runs in Folge mit unzugänglichen Logs).
      - name: Runner-Environment
        run: |
          echo "Java: $(java -version 2>&1 | head -1)"
          echo "Maven: $(mvn --version | head -1)"
          echo "Free RAM: $(free -h | awk 'NR==2 {print $4}')"
          echo "Free Disk: $(df -h / | awk 'NR==2 {print $4}')"

      # -q (quiet) entfernt — ohne INFO-Output ist BUILD FAILURE oft
      # nicht reproduzierbar wenn die GitHub-Storage-API später keine
      # Logs ausliefert. Lieber etwas mehr Logoutput akzeptieren.
      - name: Build with Maven
        run: mvn -B clean verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  e2e-tests:
    name: E2E (Smoke + A11y)
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Playwright zieht beim ersten Page-Aufruf die Chromium-Binary automatisch.
      # Wir setzen den Browser-Cache-Pfad explizit, damit Maven-Cache-Hits ihn
      # nicht mit invalidiert und das Setup deterministisch bleibt.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.49.0

      - name: Run e2e + a11y smoke (Failsafe e2e-Profile)
        run: mvn -B -q verify -P e2e -Dit.test='SmokeIT,A11ySmokeIT' -DfailIfNoTests=false

      - name: Upload failsafe + a11y screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            target/failsafe-reports/
            target/a11y-*.png

  docker-build:
    name: Docker Build (Smoke)
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sponsorplatz:ci-${{ github.sha }}

      - name: Smoke-Test Image
        run: |
          docker run --rm -d --name smoke -p 8080:8080 sponsorplatz:ci-${{ github.sha }}
          for i in {1..30}; do
            if curl -fs http://localhost:8080/actuator/health > /dev/null; then
              echo "Healthcheck OK"; docker stop smoke; exit 0
            fi
            sleep 2
          done
          echo "Healthcheck FAILED"; docker logs smoke; docker stop smoke; exit 1
