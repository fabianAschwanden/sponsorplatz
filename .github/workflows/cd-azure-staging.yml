name: CD Azure-Staging

# Deploy auf die Azure-Staging-VM (infra/envs/azure-staging).
# Phase 15.3 — Multi-Cloud / Warm-DR. Läuft parallel zu CD Staging (Free Tier).
# Beide Pipelines sind bewusst unabhängig: ein Failure auf OCI blockiert
# Azure nicht (und umgekehrt). Trigger ist derselbe (grüner CI auf main).

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # für azure/login mit OIDC-Federation, falls später aktiviert

jobs:
  # Diagnose-Job: läuft immer und logt explizit, warum der Deploy skipped wurde.
  # Spiegelt das Pattern aus cd-staging-free.yml. Secrets können wir leider nicht
  # gleich prüfen (kein contains() auf secrets-Kontext), daher nur Vars hier.
  preflight:
    name: Preflight (vars-check)
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - id: check
        run: |
          # 'if'-Pattern statt '[ test ] && cmd' — letzteres bricht unter
          # 'set -e' (GH-Actions-Default) ab, wenn der Test false ist.
          missing=()
          if [ -z "${{ vars.AZURE_VM_IP }}" ]; then
            missing+=("vars.AZURE_VM_IP")
          fi
          if [ -z "${{ vars.AZURE_ACR_LOGIN_SERVER }}" ]; then
            missing+=("vars.AZURE_ACR_LOGIN_SERVER")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::CD-Azure skipped — fehlende Repo-Variablen: ${missing[*]}. Setup siehe infra/envs/azure-staging/README.md"
            echo "can-deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can-deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Build → Trivy → ACR-Push → SSH-Deploy
    needs: preflight
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.preflight.outputs.can-deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: azure-staging
      url: https://${{ vars.AZURE_STAGING_DOMAIN || vars.AZURE_VM_IP }}
    env:
      IMAGE_BASE: ${{ vars.AZURE_ACR_LOGIN_SERVER }}/sponsorplatz
      IMAGE_TAG:  ${{ github.event.workflow_run.head_sha || github.sha }}
      # Sentry-CLI-Token (off-by-default) — Job-Level damit der 'if'-Check
      # im Tag-Release-Step gegen env.SENTRY_AUTH_TOKEN auswerten kann
      # (secrets-Kontext ist in step-if nicht direkt verfügbar).
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG:        ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT:    ${{ vars.SENTRY_PROJECT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build einmal, lokal laden. Dasselbe Image, das auch Trivy scannt, wird
      # nach erfolgreichem Scan zu ACR gepusht — kein Re-Build.
      - name: Build image (linux/amd64 für Standard_B2s)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_BASE }}:azure-staging-latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # Login via Service Principal mit AcrPush-Rolle.
      # SP einmalig erstellen:
      #   az ad sp create-for-rbac --name sponsorplatz-cd-azure \
      #     --role AcrPush --scopes /subscriptions/<ID>/resourceGroups/sponsorplatz-azure-staging-rg/providers/Microsoft.ContainerRegistry/registries/<acr-name>
      # Die Ausgabe (appId/password/tenant) als 3 Secrets im Repo speichern.
      - name: Azure-Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_SP_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_SP_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: ACR-Login + Push
        run: |
          # ACR-Name ist der Hostname-Anteil vor .azurecr.io
          ACR_NAME=$(echo "${{ vars.AZURE_ACR_LOGIN_SERVER }}" | cut -d. -f1)
          az acr login --name "$ACR_NAME"
          docker push ${{ env.IMAGE_BASE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_BASE }}:azure-staging-latest

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.AZURE_VM_IP }} >> ~/.ssh/known_hosts

      # Identisches Pattern wie cd-staging-free.yml: CD-managed Secrets wandern
      # in die VM-.env. Andere Secrets (DB_PASSWORD, SMTP_*, ADMIN_*) bleiben in
      # der von Terraform/cloud-init gesetzten /opt/sponsorplatz/.env und sind
      # hier nicht rotations-getrieben.
      #   - SPONSORPLATZ_API_KEY (Secret, off-by-default → 503 wenn fehlt)
      #   - SENTRY_DSN (Secret, off-by-default → Sentry-Bean wird nicht erstellt)
      #   - SENTRY_RELEASE (immer aus github.sha → Spring-Property löst auf)
      #   - GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (Secrets, off-by-default →
      #     Spring registriert Google-Client nur wenn beide nicht-leer sind)
      - name: Sync managed Secrets in VM-.env (idempotent)
        if: success()
        env:
          API_KEY: ${{ secrets.SPONSORPLATZ_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: sponsorplatz@${{ env.IMAGE_TAG }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::notice::SPONSORPLATZ_API_KEY-Secret nicht gesetzt — überspringe API-Key-Update. API bleibt deaktiviert (503)."
          fi
          if [ -z "$SENTRY_DSN" ]; then
            echo "::notice::SENTRY_DSN-Secret nicht gesetzt — Sentry bleibt deaktiviert. Release-Tag wird trotzdem gesetzt."
          fi
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "::notice::GOOGLE_CLIENT_ID-Secret nicht gesetzt — Google-OIDC-Login bleibt deaktiviert."
          fi
          ssh sponsoradmin@${{ vars.AZURE_VM_IP }} "
            set -e
            sudo touch /opt/sponsorplatz/.env
            sudo grep -vE '^(SPONSORPLATZ_API_KEY|SENTRY_DSN|SENTRY_RELEASE|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET)=' /opt/sponsorplatz/.env > /tmp/env.new || true
            if [ -n '$API_KEY' ]; then
              echo 'SPONSORPLATZ_API_KEY=$API_KEY' >> /tmp/env.new
            fi
            if [ -n '$SENTRY_DSN' ]; then
              echo 'SENTRY_DSN=$SENTRY_DSN' >> /tmp/env.new
            fi
            echo 'SENTRY_RELEASE=$SENTRY_RELEASE' >> /tmp/env.new
            if [ -n '$GOOGLE_CLIENT_ID' ]; then
              echo 'GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID' >> /tmp/env.new
              echo 'GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET' >> /tmp/env.new
            fi
            sudo install -m 0600 -o root -g root /tmp/env.new /opt/sponsorplatz/.env
            rm -f /tmp/env.new
            echo 'Managed secrets synced in /opt/sponsorplatz/.env'
          "

      - name: Deploy on VM (ACR-Refresh + cleanup + pull + restart)
        run: |
          # Auf der VM muss vor `docker compose pull` der ACR-Login frisch sein
          # — das übernimmt /usr/local/bin/sponsorplatz-acr-refresh, das von
          # cloud-init installiert wurde (MSI-basierter `az acr login`).
          # Pre-Pull-Cleanup: alte ungenutzte Images älter als 24h löschen.
          # Stale-Container-Cleanup: ein abgebrochener --force-recreate-Lauf
          # kann einen Container mit hash-prefix-Namen liegen lassen
          # ('<hash>_sponsorplatz-app'), der den Original-Namen blockt
          # ('Error when allocating new name'). 'docker compose down app'
          # entfernt sowohl den laufenden als auch alle compose-getrackten
          # Renames sauber; ein nachgeschobenes 'rm -f' fängt die seltenen
          # Fälle wo down nicht weiterhilft.
          # --force-recreate: ENV-Änderungen aus dem .env-Sync-Step werden
          # nur beim Container-Re-Create wirksam (Image-Tag kann gleich bleiben).
          ssh sponsoradmin@${{ vars.AZURE_VM_IP }} \
            "sudo /usr/local/bin/sponsorplatz-acr-refresh && \
             sudo docker system prune -af --filter 'until=24h' 2>&1 | tail -3 && \
             cd /opt/sponsorplatz && sudo docker compose pull app && \
             (sudo docker compose down app || sudo docker rm -f sponsorplatz-app || true) && \
             sudo docker compose up -d --force-recreate app"

      # Sentry-Release in der Sentry-UI registrieren — nur wenn das Secret
      # gesetzt ist. Liefert Suspect-Commits + Deploy-Marker im Sentry-Issue-
      # Detail. SENTRY_RELEASE auf der VM (siehe Sync-Step oben) reicht für
      # das Event-Tagging; dieser Step ist nur das Reporting nach Sentry.
      - name: Tag release in Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          environment: azure-staging
          version: sponsorplatz@${{ env.IMAGE_TAG }}
          ignore_missing: true
          ignore_empty: true

      - name: Smoke test
        run: |
          # Actuator läuft in prod auf Loopback:9090 (siehe application-prod.properties)
          # und ist von ausserhalb der VM bewusst NICHT erreichbar.
          # Stattdessen probieren wir die /login-Public-Route — die liefert nur
          # 200, wenn Tomcat + Thymeleaf + SecurityConfig + Flex-Server-Verbindung
          # alle hochgekommen sind.
          SMOKE_URL="${{ vars.AZURE_STAGING_DOMAIN && format('https://{0}', vars.AZURE_STAGING_DOMAIN) || format('http://{0}', vars.AZURE_VM_IP) }}/login"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "$SMOKE_URL"; then
              echo "Smoke OK after $i polls ($SMOKE_URL)"; exit 0
            fi
            echo "Poll $i — not ready yet ($SMOKE_URL)"
            sleep 10
          done
          echo "Smoke check failed at $SMOKE_URL"
          exit 1

      - name: Azure-Logout
        if: always()
        run: az logout || true
